<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务数据上传 - 美团代理商专用</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" type="image/svg+xml">
  <script src="js/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      padding: 40px;
    }
    h1 { text-align: center; color: #1f2937; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #e2e8f0;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--primary);
      background: #f0f4ff;
    }
    .upload-area i { font-size: 48px; color: var(--primary); margin-bottom: 16px; display: block; }
    .upload-area span { display: block; color: #374151; font-size: 16px; margin-bottom: 8px; }
    .upload-area small { color: #9ca3af; }
    #fileInput { display: none; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: #f0f4ff; }
    .status {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .status.success { background: #dcfce7; color: #166534; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .status.info { background: #dbeafe; color: #1e40af; display: block; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 16px;
      display: none;
    }
    .progress-bar .progress {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      width: 0%;
      transition: width 0.3s ease;
    }
    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .feature {
      text-align: center;
      padding: 20px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .feature i { font-size: 28px; color: var(--primary); margin-bottom: 8px; }
    .feature h3 { color: #374151; margin-bottom: 4px; }
    .feature p { color: #6b7280; font-size: 14px; }
    .github-link { text-align: center; margin-top: 24px; color: #6b7280; }
    .github-link a { color: var(--primary); text-decoration: none; }
    .data-preview {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      border: 1px solid #e5e7eb;
      padding: 8px;
      text-align: left;
      font-size: 12px;
    }
    .data-table th {
      background: #f3f4f6;
      font-weight: 600;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .history-section {
      margin-top: 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    .history-section h3 {
      color: #374151;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #6b7280;
    }
    .empty-state i {
      font-size: 32px;
      margin-bottom: 8px;
      display: block;
    }
    .history-item {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }
    .history-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .history-item:last-child { margin-bottom: 0; }
    .history-date { font-weight: 600; color: #1f2937; }
    .history-info { font-size: 13px; color: #6b7280; }
    .history-actions { display: flex; gap: 8px; }
    .history-btn {
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    .history-btn.view { background: #f3f4f6; color: #374151; }
    .history-btn.view:hover { background: #e5e7eb; }
    .history-btn.delete { background: #fee2e2; color: #dc2626; }
    .history-btn.delete:hover { background: #fecaca; }
    .status-panel {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }
    .status-panel.success { background: #dcfce7; display: block; }
    .status-panel.error { background: #fee2e2; display: block; }
    .status-panel.info { background: #dbeafe; display: block; }
    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .status-icon { font-size: 24px; }
    .status-title { font-size: 18px; font-weight: 600; color: #1f2937; }
    .status-body { margin-bottom: 16px; line-height: 1.6; color: #4b5563; }
    .status-timeline { border-left: 2px solid #e2e8f0; padding-left: 20px; }
    .status-panel.success .status-timeline { border-color: #86efac; }
    .status-panel.error .status-timeline { border-color: #fca5a5; }
    .timeline-item {
      position: relative;
      padding-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      margin-left: -26px;
      margin-top: 3px;
    }
    .status-panel.success .timeline-item.done .timeline-dot { background: #10b981; }
    .status-panel.error .timeline-item.error .timeline-dot { background: #ef4444; }
    .timeline-text { font-size: 13px; color: #64748b; }
    .timeline-text.success { color: #166534; }
    .timeline-text.error { color: #991b1b; }
    .timeline-time { font-size: 11px; color: #9ca3af; margin-left: 8px; }
    .status-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .stat-item {
      text-align: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #1f2937; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .token-section {
      margin-bottom: 20px;
      padding: 16px;
      background: #fef3c7;
      border-radius: 8px;
      border: 1px solid #fbbf24;
    }
    .cloud-test-section {
      margin-top: 20px;
      padding: 16px;
      background: #f0f9ff;
      border-radius: 8px;
      border: 1px solid #7dd3fc;
      display: none;
    }
    .cloud-test-results {
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      padding: 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
    .progress-container {
      margin-top: 16px;
      display: none;
    }
    .progress-text {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 财务数据上传</h1>
    <p class="subtitle">上传美团财务Excel账单，数据将自动同步到云端</p>
    
    <div class="features">
      <div class="feature">
        <i>💻</i>
        <h3>本地解析</h3>
        <p>数据在浏览器中处理，安全可靠</p>
      </div>
      <div class="feature">
        <i>📁</i>
        <h3>格式兼容</h3>
        <p>支持.xlsx, .xls, .csv格式</p>
      </div>
      <div class="feature">
        <i>📋</i>
        <h3>历史记录</h3>
        <p>查看已上传的数据记录</p>
      </div>
    </div>

    <div class="token-section" id="tokenSection">
      <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <label style="display: block; font-size: 13px; font-weight: 500; color: #92400e; margin-bottom: 4px;">🔑 GitHub Token</label>
          <input type="password" id="githubTokenInput" placeholder="请输入GitHub Personal Access Token" style="width: 100%; padding: 10px; border: 1px solid #f59e0b; border-radius: 6px; font-family: monospace; font-size: 12px;">
        </div>
        <button class="btn btn-outline" style="height: 42px; padding: 0 20px;" onclick="validateToken()">验证Token</button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
        <input type="checkbox" id="rememberToken" style="width: 16px; height: 16px;">
        <label for="rememberToken" style="font-size: 13px; color: #b45309;">记住Token（保存到本地浏览器，更换浏览器或清除缓存后需重新输入）</label>
      </div>
      <p style="font-size: 12px; color: #b45309; margin-top: 4px; margin-bottom: 0;">提示：Token需拥有 repo 权限，用于上传数据到GitHub</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <i>📁</i>
      <span>点击或拖拽Excel文件到此处上传</span>
      <small>支持 .xlsx, .xls, .csv格式</small>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
    </div>
    
    <div class="status-panel" id="statusPanel">
      <div class="status-header" id="statusHeader"></div>
      <div class="status-body" id="statusBody"></div>
      <div class="status-timeline" id="statusTimeline"></div>
    </div>
    
    <div class="data-preview" id="dataPreview" style="display: none;">
      <h3 style="margin: 12px;">📋 数据预览</h3>
      <table class="data-table" id="previewTable"></table>
    </div>
    
    <div class="actions" id="actions" style="display: none;">
      <button class="btn btn-success" id="uploadCloudBtn">☁️ 上传到云端</button>
      <button class="btn btn-primary" id="saveLocalBtn">💾 保存到本地</button>
      <button class="btn btn-outline" id="goToAnalysisBtn">📈 查看分析</button>
      <button class="btn btn-outline" id="testCloudBtn">🔍 云端诊断</button>
    </div>
    
    <div class="cloud-test-section" id="cloudTestSection">
      <h3 style="margin: 0 0 12px 0; color: #0369a1;">☁️ 云端连接诊断</h3>
      <div class="cloud-test-results" id="cloudTestResults"></div>
    </div>
    
    <div class="history-section" id="historySection">
      <h3>📋 上传历史记录 <button class="btn btn-outline" style="margin-left: auto; padding: 6px 16px; font-size: 13px;" onclick="refreshHistory()">🔄 刷新列表</button></h3>
      <div class="history-list" id="historyList">
        <div class="empty-state" id="emptyState">
          <i>📭</i>
          <div>暂无上传记录</div>
          <div style="font-size: 13px; margin-top: 4px;">上传数据后会显示在这里</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const progressContainer = document.getElementById('progressContainer');
    const statusPanel = document.getElementById('statusPanel');
    const statusHeader = document.getElementById('statusHeader');
    const statusBody = document.getElementById('statusBody');
    const statusTimeline = document.getElementById('statusTimeline');
    const dataPreview = document.getElementById('dataPreview');
    const previewTable = document.getElementById('previewTable');
    const actions = document.getElementById('actions');
    const uploadCloudBtn = document.getElementById('uploadCloudBtn');
    const saveLocalBtn = document.getElementById('saveLocalBtn');
    const goToAnalysisBtn = document.getElementById('goToAnalysisBtn');
    const testCloudBtn = document.getElementById('testCloudBtn');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const emptyState = document.getElementById('emptyState');
    const cloudTestSection = document.getElementById('cloudTestSection');
    const cloudTestResults = document.getElementById('cloudTestResults');
    const loadHistoryBtn = document.getElementById('refreshBtn');

    let parsedData = null;
    let cloudData = [];
    let currentFileName = '';
    let timelineItems = [];
    
    const GITHUB_API = 'https://api.github.com/repos/xinglianyue/finance-tool/contents/shared-data.json';
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/xinglianyue/finance-tool/main/shared-data.json';
    
    function getToken() {
      return document.getElementById('githubTokenInput').value.trim();
    }
    
    function saveToken(token) {
      if (document.getElementById('rememberToken').checked) {
        localStorage.setItem('finance_tool_github_token', token);
        console.log('[Token] Token已保存到本地存储');
      }
    }
    
    function loadSavedToken() {
      const savedToken = localStorage.getItem('finance_tool_github_token');
      if (savedToken) {
        document.getElementById('githubTokenInput').value = savedToken;
        document.getElementById('rememberToken').checked = true;
        console.log('[Token] 已加载保存的Token');
      }
    }
    
    async function validateToken() {
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请输入有效的GitHub Token（以ghp_开头）');
        return;
      }
      
      const headers = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json'
      };
      
      try {
        const resp = await fetch('https://api.github.com/user', { headers });
        if (resp.ok) {
          saveToken(token);
          alert('✅ Token验证成功！');
        } else {
          alert('❌ Token无效或权限不足');
        }
      } catch (e) {
        alert('❌ 连接失败: ' + e.message);
      }
    }
    
    const CONFIG = {
      CITY_DISPLAY_MAP: {
        '承德市': '承德',
        '围场满族蒙古族自治县': '围场',

        '安国市': '安国',
        '安平': '安平',
        '献县': '献县',
        '晋州': '晋州',
        '威县': '威县',
        '深泽县': '深泽',
        '康保县': '康保'
      },
      MERCHANT_TYPES: [
        { sheetName: '全量商家', key: 'all', label: '全量商家' },
        { sheetName: '城市商家', key: 'city', label: '城市商家' },
        { sheetName: 'KA商家', key: 'ka', label: 'KA商家' }
      ],
      MODULES: {
        all: { key: 'all', name: '全品类' },
        food: { key: 'food', name: '餐饮外卖' },
        flash: { key: 'flash', name: '闪购' },
        medicine: { key: 'medicine', name: '医药' },
        group: { key: 'group', name: '到店' }
      }
    };

    const FIELD_RULES = [
      ['', '订单量汇总', 'orders'],
      ['', '加盟订单量', 'franchiseOrders'],
      ['', '自配订单量', 'selfOrders'],

      ['', '企客商家抽佣金额', 'enterpriseCommission'],

      ['', '加盟配送费', 'franchiseDeliveryFee'],
      ['', '二次配送费', 'secondDeliveryFee'],
      ['', '企客配送费', 'enterpriseDeliveryFee'],

      ['', '合作商运营服务费', 'otherRevenue'],

      ['', '其他成本汇总', 'otherCost']
    ];

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showProgress(percent, text) {
      progressContainer.style.display = 'block';
      progressBar.style.display = 'block';
      progress.style.width = percent + '%';
      progressText.textContent = text;
    }

    function hideProgress() {
      progressContainer.style.display = 'none';
      progressBar.style.display = 'none';
    }

    function showStatus(type, title, body) {
      statusPanel.className = 'status-panel ' + type;
      const icon = type === 'success' ? '🎉' : (type === 'error' ? '😢' : '📋');
      statusHeader.innerHTML = '<span class="status-icon">' + icon + '</span><span class="status-title">' + title + '</span>';
      statusBody.innerHTML = body;
    }

    function clearTimeline() {
      statusTimeline.innerHTML = '';
      timelineItems = [];
    }

    function addTimelineItem(text) {
      const item = document.createElement('div');
      item.className = 'timeline-item';
      item.innerHTML = '<div class="timeline-dot"></div><span class="timeline-text">' + text + '<span class="timeline-time">' + new Date().toLocaleTimeString() + '</span></span>';
      statusTimeline.appendChild(item);
      timelineItems.push(item);
    }

    function updateTimelineItem(index, status) {
      if (timelineItems[index]) {
        timelineItems[index].className = 'timeline-item ' + status;
        const textSpan = timelineItems[index].querySelector('.timeline-text');
        if (status === 'done') {
          textSpan.className = 'timeline-text success';
        } else if (status === 'error') {
          textSpan.className = 'timeline-text error';
        }
      }
    }

    function parseWorkbook(workbook) {
      const MERCHANT_TYPES = [
        { sheetName: '全量商家', key: 'all', label: '全量商家' },

      ];

      const COL2_RULES = { '毛利': 'profit', '收入汇总': 'totalRevenue', '支出汇总': 'totalExpense' };
      const COL3_RULES = {
        '线上收入汇总': 'onlineRevenue', '线上支出汇总': 'onlineExpense', '线下支出汇总': 'offlineExpense',
        '毛利': 'profit', '收入汇总': 'totalRevenue', '支出汇总': 'totalExpense',
      };

      const MODULE_DEFS = [
        { searchName: '全品类财务指标', key: 'all', label: '全品类' },
        { searchName: '餐饮财务指标', key: 'food', label: '餐饮' },

        { searchName: '拼好饭财务指标', key: 'group', label: '拼好饭' }
      ];

      function extractModule(data, startRow, colIdx) {
        const result = {};
        FIELD_RULES.forEach(r => result[r[2]] = 0);
        Object.values(COL2_RULES).forEach(f => result[f] = 0);
        Object.values(COL3_RULES).forEach(f => result[f] = 0);

        for (let rn = startRow + 3; rn < Math.min(startRow + 100, data.length); rn++) {
          const row = data[rn];
          if (!row) continue;
          const c2 = String(row[2] || '').trim();
          const c3 = String(row[3] || '').trim();
          const c4 = String(row[4] || '').trim();
          if (c3 && c3.includes('财务指标')) break;
          const val = typeof row[colIdx] === 'number' ? row[colIdx] : parseFloat(String(row[colIdx]).replace(/,/g, '')) || 0;

          FIELD_RULES.forEach(([k23, k4, field]) => {
            if (k4 && c4 === k4 && result[field] === 0 && val !== 0) result[field] = val;
          });
          for (const [k2, field] of Object.entries(COL2_RULES)) {
            if (c2 === k2 && result[field] === 0) result[field] = val;
          }
          for (const [k3, field] of Object.entries(COL3_RULES)) {
            if (c3 === k3 && c4 === '' && result[field] === 0 && val !== 0) result[field] = val;
          }
        }

        const o = result.orders;
        result.ue = o > 0 ? result.profit / o : 0;
        result.subsidyRatio = result.gmvAmount > 0 ? result.subsidyTotal / result.gmvAmount : 0;
        result.profitRate = result.onlineRevenue > 0 ? result.profit / result.onlineRevenue : 0;
        result.avgRevenuePerOrder = o > 0 ? result.onlineRevenue / o : 0;
        result.avgCostPerOrder = o > 0 ? result.totalExpense / o : 0;
        result.deliveryCostRate = result.onlineRevenue > 0 ? result.deliveryCost / result.onlineRevenue : 0;
        result.fixedCostRate = result.onlineRevenue > 0 ? result.fixedCost / result.onlineRevenue : 0;
        result.subsidyRateB = result.gmvAmount > 0 ? result.subsidyB / result.gmvAmount : 0;
        result.subsidyRateC = result.gmvAmount > 0 ? result.subsidyC / result.gmvAmount : 0;
        result.enterpriseRatio = o > 0 ? result.enterpriseOrders / o : 0;
        result.selfRatio = o > 0 ? result.selfOrders / o : 0;

        return result;
      }

      const merchantData = {};
      for (const mt of MERCHANT_TYPES) {
        let ws = null;
        if (workbook.SheetNames.includes(mt.sheetName)) {
          ws = workbook.Sheets[mt.sheetName];
        } else if (mt.key === 'all' && workbook.SheetNames.length > 0) {
          ws = workbook.Sheets[workbook.SheetNames[0]];
        }
        if (!ws) {
          console.log('[parseExcelFile] sheet未找到:', mt.sheetName);
          continue;
        }
        console.log('[parseExcelFile] 开始解析:', mt.sheetName);

        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
        const cityRow = data[2];
        if (!cityRow) continue;

        const cityMap = {};
        for (let col = 5; col < cityRow.length; col++) {
          const excelName = String(cityRow[col] || '').trim();
          if (!excelName || excelName === '总商') continue;
          cityMap[col] = { excelName, displayName: CONFIG.CITY_DISPLAY_MAP[excelName] || excelName };
        }
        let totalCol = -1;
        for (let col = 5; col < (cityRow.length || 20); col++) {
          if (String(cityRow[col] || '').trim() === '总商') {
            totalCol = col;
            break;
          }
        }

        const modulePositions = {};
        for (let rn = 0; rn < Math.min(500, data.length); rn++) {
          const row = data[rn];
          if (!row) continue;
          const c0 = String(row[0] || '').trim();
          for (const md of MODULE_DEFS) {
            if (c0 === md.searchName && !modulePositions[md.key]) {
              modulePositions[md.key] = rn;
            }
          }
        }

        console.log('[parseExcelFile]', mt.sheetName, '模块数:', Object.keys(modulePositions).length, Object.keys(modulePositions));
        if (Object.keys(modulePositions).length === 0) continue;

        const result = [];
        for (const [col, cityInfo] of Object.entries(cityMap)) {
          const cityData = { name: cityInfo.excelName, displayName: cityInfo.displayName, modules: {} };
          for (const md of MODULE_DEFS) {
            if (modulePositions[md.key] === undefined) continue;
            const fields = extractModule(data, modulePositions[md.key], parseInt(col));
            fields.moduleName = md.label;
            fields.moduleKey = md.key;
            cityData.modules[md.key] = fields;
          }
          result.push(cityData);
        }

        if (totalCol >= 0) {
          const totalData = { name: '总商', displayName: '总商', modules: {} };
          for (const md of MODULE_DEFS) {
            if (modulePositions[md.key] === undefined) continue;
            const fields = extractModule(data, modulePositions[md.key], totalCol);
            fields.moduleName = md.label;
            fields.moduleKey = md.key;
            totalData.modules[md.key] = fields;
          }
          result.unshift(totalData);
        }

        if (result.length > 0) {
          merchantData[mt.key] = { label: mt.label, cities: result };
        }
      }

      console.log('[parseExcelFile] 解析结果:', Object.keys(merchantData));
      Object.entries(merchantData).forEach(([k, v]) => console.log('  ', k, '城市:', v.cities.map(c => c.name)));
      if (Object.keys(merchantData).length === 0) {
        throw new Error('未识别到任何商家类型数据，请确认文件格式正确');
      }
      return merchantData;
    }
    
    function parseDateFromFilename(filename) {
      const p1 = filename.match(/(\d{4})[-_]?(0[1-9]|1[0-2])[-_]?(0[1-9]|[12]\d|3[01])/);
      if (p1) { return p1[1] + '-' + p1[2] + '-' + p1[3]; }
      const p2 = filename.match(/(\d{4})年(\d{1,2})月(\d{1,2})/);
      if (p2) { return p2[1] + '-' + String(parseInt(p2[2])).padStart(2,'0') + '-' + String(parseInt(p2[3])).padStart(2,'0'); }
      const p3 = filename.match(/(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(?![\d年])/);
      if (p3) {
        const yr = new Date().getFullYear();
        return yr + '-' + p3[1] + '-' + p3[2];
      }
      return new Date().toISOString().split('T')[0];
    }

    function buildOutputData(merchantData) {
      const cities = [];
      const allCities = merchantData.all?.cities || [];
      
      allCities.forEach(city => {
        const cityItem = {
          name: city.name,
          displayName: city.displayName,
          modules: city.modules
        };
        cities.push(cityItem);
      });
      
      const dataDate = currentFileName ? parseDateFromFilename(currentFileName) : new Date().toISOString().split('T')[0];
      
      return {
        date: dataDate,
        cities: cities,
        merchantData: merchantData,
        fileName: currentFileName
      };
    }

    async function uploadToCloud(data, fileName) {
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请先输入有效的GitHub Token');
        return false;
      }
      
      saveToken(token);
      
      const headers = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json'
      };

      let sha = null;
      let existingRecords = [];

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const resp = await fetch(GITHUB_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (resp.ok) {
          const githubData = await resp.json();
          sha = githubData.sha;
          try {
            const decoded = JSON.parse(atob(githubData.content));
            existingRecords = Array.isArray(decoded) ? decoded : [];
          } catch (e) {
            existingRecords = [];
          }
        }
      } catch (e) {
        console.log('[Upload] 无法读取现有数据，可能是首次上传');
      }

      const newRecord = {
        date: data.date,
        updatedAt: new Date().toISOString(),
        uploadedBy: 'web',
        fileName: fileName,
        currentData: data
      };

      const monthKey = data.date.substring(0, 7);
      const existingIndex = existingRecords.findIndex(r => r.date.startsWith(monthKey));
      
      if (existingIndex >= 0) {
        existingRecords[existingIndex] = newRecord;
      } else {
        existingRecords.unshift(newRecord);
      }

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(existingRecords, null, 2))));
      
      const body = {
        message: 'Update financial data: ' + data.date,
        content: content,
        branch: 'main'
      };
      
      if (sha) {
        body.sha = sha;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const response = await fetch(GITHUB_API, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(body),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (response.ok) {
          const result = await response.json();
          console.log('[Upload] 上传成功:', result);
          return true;
        } else {
          console.error('[Upload] 上传失败:', response.status, await response.text());
          return false;
        }
      } catch (e) {
        console.error('[Upload] 上传异常:', e);
        return false;
      }
    }

        const readResponse = await fetch(GITHUB_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        results += '   读取API响应: ' + readResponse.status + ' ' + readResponse.statusText + '\n';
        
        if (readResponse.ok) {
          const data = await readResponse.json();
          results += '   ✅ 文件存在\n';
          results += '   SHA: ' + (data.sha ? data.sha.substring(0, 20) + '...' : '无') + '\n';
          results += '   内容大小: ' + (data.content ? '有' : '无') + '\n';
          
          try {
            const decoded = JSON.parse(atob(data.content));
            results += '   ✅ JSON解析成功\n';
            results += '   记录数: ' + (Array.isArray(decoded) ? decoded.length : '非数组') + '\n';
            
            if (Array.isArray(decoded) && decoded.length > 0) {
              results += '   最新记录日期: ' + (decoded[0].date || '未知') + '\n';
              results += '   上传者: ' + (decoded[0].uploadedBy || '未知') + '\n';
            }
          } catch (e) {
            results += '   ❌ JSON解析失败: ' + e.message + '\n';
          }
        } else if (readResponse.status === 404) {
          results += '   ⚠️ 文件不存在（正常，首次上传前会显示此信息）\n';
        } else {
          results += '   ❌ API错误: ' + readResponse.status + '\n';
        }
        
        results += '\n3️⃣ 测试GitHub Raw URL访问...\n';
        const rawController = new AbortController();
        const rawTimeoutId = setTimeout(() => rawController.abort(), 10000);
        
        const rawResponse = await fetch(GITHUB_RAW_URL, { signal: rawController.signal });
        clearTimeout(rawTimeoutId);
        
        results += '   Raw URL响应: ' + rawResponse.status + ' ' + rawResponse.statusText + '\n';
        
        if (rawResponse.ok) {
          results += '   ✅ Raw URL可访问\n';
        } else if (rawResponse.status === 404) {
          results += '   ⚠️ Raw文件不存在（正常，首次上传前会显示此信息）\n';
        } else {
          results += '   ❌ Raw URL访问失败\n';
        }
        
        results += '\n4️⃣ 检查CORS策略...\n';
        results += '   GitHub API: ' + (readResponse.ok || readResponse.status === 404 ? '✅ 支持CORS' : '❌ CORS问题') + '\n';
        results += '   GitHub Raw: ' + (rawResponse.ok || rawResponse.status === 404 ? '✅ 支持CORS' : '❌ CORS问题') + '\n';
        
        results += '\n✅ 诊断完成！\n';
        results += '\n💡 如果所有检查都通过，云端功能应该正常工作。\n';
        results += '   如果有任何❌标记，请检查相应配置或Token权限。\n';
        
      } catch (e) {
        results += '\n❌ 诊断失败: ' + e.message + '\n';
        if (e.name === 'AbortError') {
          results += '   可能原因: 网络超时或请求被阻止\n';
        }
      }
      
      cloudTestResults.textContent = results;
      cloudTestResults.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    testCloudBtn.addEventListener('click', runCloudDiagnostic);

    document.addEventListener('DOMContentLoaded', function() {
      loadSavedToken();
      loadHistoryData();
    });

    uploadArea.addEventListener('click', function() { fileInput.click(); });
    uploadArea.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', function() {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });
    fileInput.addEventListener('change', function(e) {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    async function loadHistoryData() {
      try {
        const token = localStorage.getItem('GITHUB_TOKEN');
        const headers = token ? { 'Authorization': 'token ' + token } : {};
        const resp = await fetch(GITHUB_API, { headers });
        
        if (resp.ok) {
          const data = await resp.json();
          const content = atob(data.content);
          cloudData = JSON.parse(content);
          
          if (!Array.isArray(cloudData)) {
            cloudData = [];
          }
          
          if (cloudData.length === 0) {
            historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>暂无上传记录</div><div style="font-size: 13px; margin-top: 4px;">上传数据后会显示在这里</div></div>';
            return;
          }
          
          let html = '';
          cloudData.forEach((record, index) => {
            html += '<div class="history-item">' +
              '<div>' +
                '<div class="history-date">' + record.date + '</div>' +
                '<div class="history-info">文件: ' + (record.fileName || '未知') + ' | 上传者: ' + (record.uploadedBy || '未知') + '</div>' +
              '</div>' +
              '<div class="history-actions">' +
                '<button class="history-btn view" onclick="viewRecord(' + index + ')">查看</button>' +
                '<button class="history-btn delete" onclick="deleteRecord(' + index + ')">删除</button>' +
              '</div>' +
            '</div>';
          });
          
          historyList.innerHTML = html;
        } else {
          historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>无法加载历史记录</div><div style="font-size: 13px; margin-top: 4px;">请检查网络连接</div></div>';
        }
      } catch (e) {
        console.error('[Error] 加载历史记录失败:', e);
        historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>历史记录加载失败</div><div style="font-size: 13px; margin-top: 4px;">将创建新的数据集</div></div>';
        cloudData = [];
      }
    }

    function viewRecord(index) {
      const record = cloudData[index];
      if (record && record.currentData) {
        parsedData = record.currentData;
        renderPreview(parsedData);
        showStatus('info', '查看历史数据', '已加载 ' + record.date + ' 的数据');
        actions.style.display = 'flex';
      }
    }

    function deleteRecord(index) {
      if (!confirm('确定要删除这条记录吗？')) return;
      
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请先输入有效的GitHub Token');
        return;
      }
      
      fetch(GITHUB_API, {
        headers: {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json'
        }
      }).then(resp => resp.json()).then(data => {
        const currentContent = atob(data.content);
        const currentData = JSON.parse(currentContent);
        
        if (!Array.isArray(currentData)) {
          alert('数据格式错误');
          return;
        }
        
        if (index >= currentData.length) {
          alert('记录不存在');
          return;
        }
        
        currentData.splice(index, 1);
        
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        return fetch(GITHUB_API, {
          method: 'PUT',
          headers: {
            'Authorization': 'token ' + token,
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: 'Delete record',
            content: content,
            sha: data.sha,
            branch: 'main'
          })
        });
      }).then(() => {
        loadHistoryData();
        alert('删除成功！');
      }).catch(e => {
        console.error('[Error] 删除失败:', e);
        alert('删除失败: ' + e.message);
      });
    }
  </script>
</body>
</html>
