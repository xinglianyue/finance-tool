<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务数据上传 - 美团代理商专用</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" type="image/svg+xml">
  <script src="js/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      padding: 40px;
    }
    h1 { text-align: center; color: #1f2937; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #e2e8f0;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--primary);
      background: #f0f4ff;
    }
    .upload-area i { font-size: 48px; color: var(--primary); margin-bottom: 16px; display: block; }
    .upload-area span { display: block; color: #374151; font-size: 16px; margin-bottom: 8px; }
    .upload-area small { color: #9ca3af; }
    #fileInput { display: none; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #15803d; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: #f0f4ff; }
    .status {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .status.success { background: #dcfce7; color: #166534; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .status.info { background: #dbeafe; color: #1e40af; display: block; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 16px;
      display: none;
    }
    .progress-bar .progress {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      width: 0%;
      transition: width 0.3s ease;
    }
    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .feature {
      text-align: center;
      padding: 20px;
      background: #f8fafc;
      border-radius: 8px;
    }
    .feature i { font-size: 28px; color: var(--primary); margin-bottom: 8px; }
    .feature h3 { color: #374151; margin-bottom: 4px; }
    .feature p { color: #6b7280; font-size: 14px; }
    .github-link { text-align: center; margin-top: 24px; color: #6b7280; }
    .github-link a { color: var(--primary); text-decoration: none; }
    .data-preview {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      border: 1px solid #e5e7eb;
      padding: 8px;
      text-align: left;
      font-size: 12px;
    }
    .data-table th {
      background: #f3f4f6;
      font-weight: 600;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .history-section {
      margin-top: 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    .history-section h3 {
      color: #374151;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #6b7280;
    }
    .empty-state i {
      font-size: 32px;
      margin-bottom: 8px;
      display: block;
    }
    .history-item {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }
    .history-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .history-item:last-child { margin-bottom: 0; }
    .history-date { font-weight: 600; color: #1f2937; }
    .history-info { font-size: 13px; color: #6b7280; }
    .history-actions { display: flex; gap: 8px; }
    .history-btn {
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }
    .history-btn.view { background: #f3f4f6; color: #374151; }
    .history-btn.view:hover { background: #e5e7eb; }
    .history-btn.delete { background: #fee2e2; color: #dc2626; }
    .history-btn.delete:hover { background: #fecaca; }
    .history-loading {
      display: flex;
      align-items: center;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .history-loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .status-panel {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }
    .status-panel.success { background: #dcfce7; display: block; }
    .status-panel.error { background: #fee2e2; display: block; }
    .status-panel.info { background: #dbeafe; display: block; }
    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .status-icon { font-size: 24px; }
    .status-title { font-size: 18px; font-weight: 600; color: #1f2937; }
    .status-body { margin-bottom: 16px; line-height: 1.6; color: #4b5563; }
    .status-timeline { border-left: 2px solid #e2e8f0; padding-left: 20px; }
    .status-panel.success .status-timeline { border-color: #86efac; }
    .status-panel.error .status-timeline { border-color: #fca5a5; }
    .timeline-item {
      position: relative;
      padding-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      margin-left: -26px;
      margin-top: 3px;
    }
    .status-panel.success .timeline-item.done .timeline-dot { background: #10b981; }
    .status-panel.error .timeline-item.error .timeline-dot { background: #ef4444; }
    .timeline-text { font-size: 13px; color: #64748b; }
    .timeline-text.success { color: #166534; }
    .timeline-text.error { color: #991b1b; }
    .timeline-time { font-size: 11px; color: #9ca3af; margin-left: 8px; }
    .status-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .stat-item {
      text-align: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #1f2937; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .token-section {
      margin-bottom: 20px;
      padding: 16px;
      background: #fef3c7;
      border-radius: 8px;
      border: 1px solid #fbbf24;
    }
    .cloud-test-section {
      margin-top: 20px;
      padding: 16px;
      background: #f0f9ff;
      border-radius: 8px;
      border: 1px solid #7dd3fc;
      display: none;
    }
    .cloud-test-results {
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      padding: 12px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
    .progress-container {
      margin-top: 16px;
      display: none;
    }
    .progress-text {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* ==================== 移动端优化（增强版） ==================== */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      
      .container {
        padding: 16px;
        border-radius: 12px;
      }
      
      h1 {
        font-size: 20px;
      }
      
      .subtitle {
        font-size: 13px;
        line-height: 1.5;
      }
      
      .upload-area {
        padding: 36px 16px;
        min-height: 120px;
      }
      
      .upload-area i {
        font-size: 40px;
      }
      
      .upload-area p {
        font-size: 14px;
      }
      
      .upload-area strong {
        font-size: 15px;
      }
      
      .history-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 14px;
      }
      
      .history-info {
        width: 100%;
      }
      
      .history-date {
        font-size: 15px;
        font-weight: 600;
      }
      
      .history-meta {
        font-size: 12px;
        margin-top: 4px;
      }
      
      .history-actions {
        width: 100%;
        gap: 8px;
      }
      
      .history-btn {
        flex: 1;
        padding: 12px 16px;
        font-size: 14px;
        min-height: 44px;
      }
      
      .btn {
        padding: 12px 18px;
        font-size: 14px;
        min-height: 44px;
        touch-action: manipulation;
      }
      
      .btn:active {
        transform: scale(0.98);
      }
      
      #githubTokenInput {
        font-size: 15px;
        min-height: 44px;
      }
      
      .status-stats {
        grid-template-columns: 1fr;
      }
      
      .token-section {
        gap: 10px;
      }
      
      .token-section input[type="checkbox"] {
        width: 22px;
        height: 22px;
      }
      
      .token-section label {
        font-size: 14px;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
      
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 8px;
      }
      
      table {
        font-size: 12px;
      }
      
      table th,
      table td {
        padding: 10px 8px;
        white-space: nowrap;
      }
      
      .status-timeline {
        padding: 12px;
      }
      
      .progress-bar {
        height: 10px;
      }
    }
    
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      
      .container {
        padding: 14px;
      }
      
      h1 {
        font-size: 18px;
      }
      
      .subtitle {
        font-size: 13px;
      }
      
      .upload-area {
        padding: 32px 12px;
      }
      
      .upload-area i {
        font-size: 36px;
      }
      
      .upload-area p {
        font-size: 13px;
      }
      
      .upload-area strong {
        font-size: 14px;
      }
      
      .history-item {
        padding: 12px;
      }
      
      .history-date {
        font-size: 14px;
      }
      
      .history-btn {
        padding: 10px 12px;
        font-size: 13px;
      }
      
      .btn {
        padding: 11px 16px;
        font-size: 14px;
      }
      
      table {
        font-size: 11px;
      }
      
      table th,
      table td {
        padding: 8px 6px;
      }
    }
    
    /* 防止iOS点击高亮 */
    @media (hover: none) and (pointer: coarse) {
      * {
        -webkit-tap-highlight-color: transparent;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 财务数据上传</h1>
    <p class="subtitle">上传美团财务Excel账单，数据将自动同步到云端</p>
    
    <div class="features">
      <div class="feature">
        <i>💻</i>
        <h3>本地解析</h3>
        <p>数据在浏览器中处理，安全可靠</p>
      </div>
      <div class="feature">
        <i>📁</i>
        <h3>格式兼容</h3>
        <p>支持.xlsx, .xls, .csv格式</p>
      </div>
      <div class="feature">
        <i>📋</i>
        <h3>历史记录</h3>
        <p>查看已上传的数据记录</p>
      </div>
    </div>

    <div class="token-section" id="tokenSection">
      <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <label style="display: block; font-size: 13px; font-weight: 500; color: #92400e; margin-bottom: 4px;">🔑 GitHub Token</label>
          <input type="password" id="githubTokenInput" placeholder="请输入GitHub Personal Access Token" style="width: 100%; padding: 10px; border: 1px solid #f59e0b; border-radius: 6px; font-family: monospace; font-size: 12px;">
        </div>
        <button class="btn btn-outline" style="height: 42px; padding: 0 20px;" onclick="validateToken()">验证Token</button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
        <input type="checkbox" id="rememberToken" style="width: 16px; height: 16px;">
        <label for="rememberToken" style="font-size: 13px; color: #b45309;">记住Token（保存到本地浏览器，更换浏览器或清除缓存后需重新输入）</label>
      </div>
      <p style="font-size: 12px; color: #b45309; margin-top: 4px; margin-bottom: 0;">提示：Token需拥有 repo 权限，用于上传数据到GitHub</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <i>📁</i>
      <span>点击或拖拽Excel文件到此处上传</span>
      <small>支持 .xlsx, .xls, .csv格式，可一次选择多个文件</small>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple>
    
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
    </div>
    
    <div class="status-panel" id="statusPanel">
      <div class="status-header" id="statusHeader"></div>
      <div class="status-body" id="statusBody"></div>
      <div class="status-timeline" id="statusTimeline"></div>
    </div>
    
    <div class="data-preview" id="dataPreview" style="display: none;">
      <h3 style="margin: 12px;">📋 数据预览</h3>
      <table class="data-table" id="previewTable"></table>
    </div>
    
    <div class="actions" id="actions" style="display: none;">
      <button class="btn btn-success" id="uploadCloudBtn">☁️ 上传到云端</button>
      <button class="btn btn-primary" id="saveLocalBtn">💾 保存到本地</button>
      <button class="btn btn-outline" id="goToAnalysisBtn">📈 查看分析</button>
      <button class="btn btn-outline" id="testCloudBtn">🔍 云端诊断</button>
    </div>
    
    <div class="cloud-test-section" id="cloudTestSection">
      <h3 style="margin: 0 0 12px 0; color: #0369a1;">☁️ 云端连接诊断</h3>
      <div class="cloud-test-results" id="cloudTestResults"></div>
    </div>
    
    <div class="history-section" id="historySection">
      <h3>📋 上传历史记录 <button class="btn btn-outline" style="margin-left: auto; padding: 6px 16px; font-size: 13px;" onclick="refreshHistory()">🔄 刷新列表</button></h3>
      <div class="history-loading" id="historyLoading" style="display: none;">
        <div class="history-loading-spinner"></div>
        <span style="margin-left: 8px; color: #64748b;">正在从云端加载历史记录...</span>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-state" id="emptyState">
          <i>📭</i>
          <div>暂无上传记录</div>
          <div style="font-size: 13px; margin-top: 4px;">上传数据后会显示在这里</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progressText');
    const progressContainer = document.getElementById('progressContainer');
    const statusPanel = document.getElementById('statusPanel');
    const statusHeader = document.getElementById('statusHeader');
    const statusBody = document.getElementById('statusBody');
    const statusTimeline = document.getElementById('statusTimeline');
    const dataPreview = document.getElementById('dataPreview');
    const previewTable = document.getElementById('previewTable');
    const actions = document.getElementById('actions');
    const uploadCloudBtn = document.getElementById('uploadCloudBtn');
    const saveLocalBtn = document.getElementById('saveLocalBtn');
    const goToAnalysisBtn = document.getElementById('goToAnalysisBtn');
    const testCloudBtn = document.getElementById('testCloudBtn');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const emptyState = document.getElementById('emptyState');
    const cloudTestSection = document.getElementById('cloudTestSection');
    const cloudTestResults = document.getElementById('cloudTestResults');
    const loadHistoryBtn = document.getElementById('refreshBtn');

    let parsedData = null;
    let cloudData = [];
    let currentFileName = '';
    let timelineItems = [];
    
    const GITHUB_API = 'https://api.github.com/repos/xinglianyue/finance-tool/contents/shared-data.json';
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/xinglianyue/finance-tool/main/shared-data.json';
    
    function getToken() {
      return document.getElementById('githubTokenInput').value.trim();
    }
    
    function saveToken(token) {
      if (document.getElementById('rememberToken').checked) {
        localStorage.setItem('finance_tool_github_token', token);
        console.log('[Token] Token已保存到本地存储');
      }
    }
    
    function loadSavedToken() {
      const savedToken = localStorage.getItem('finance_tool_github_token');
      if (savedToken) {
        document.getElementById('githubTokenInput').value = savedToken;
        document.getElementById('rememberToken').checked = true;
        console.log('[Token] 已加载保存的Token');
      }
    }
    
    async function validateToken() {
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请输入有效的GitHub Token（以ghp_开头）');
        return;
      }
      
      const headers = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json'
      };
      
      try {
        const resp = await fetch('https://api.github.com/user', { headers });
        if (resp.ok) {
          saveToken(token);
          alert('✅ Token验证成功！');
        } else {
          alert('❌ Token无效或权限不足');
        }
      } catch (e) {
        alert('❌ 连接失败: ' + e.message);
      }
    }
    
    const CONFIG = {
      CITY_DISPLAY_MAP: {
        '承德市': '承德',
        '围场满族蒙古族自治县': '围场',
        '玉田县': '玉田',
        '安国市': '安国',
        '安平': '安平',
        '献县': '献县',
        '晋州': '晋州',
        '威县': '威县',
        '深泽县': '深泽',
        '康保县': '康保'
      },
      MERCHANT_TYPES: [
        { sheetName: '全量商家', key: 'all', label: '全量商家' },
        { sheetName: '城市商家', key: 'city', label: '城市商家' },
        { sheetName: 'KA商家', key: 'ka', label: 'KA商家' }
      ],
      MODULES: {
        all: { key: 'all', name: '全品类' },
        food: { key: 'food', name: '餐饮外卖' },
        flash: { key: 'flash', name: '闪购' },
        medicine: { key: 'medicine', name: '医药' },
        group: { key: 'group', name: '到店' }
      }
    };

    const FIELD_RULES = [
      ['', '订单量汇总', 'orders'],
      ['', '加盟订单量', 'franchiseOrders'],
      ['', '自配订单量', 'selfOrders'],
      ['', '企客订单量', 'enterpriseOrders'],
      ['', '加盟原价交易额', 'franchiseGMV'],
      ['', '自配原价交易额', 'selfGMV'],
      ['', '原价交易额', 'gmvAmount'],
      ['', '原价交易额汇总', 'gmvAmount'],
      ['', '加盟抽佣金额', 'franchiseCommission'],
      ['', '自配抽佣金额', 'selfCommission'],
      ['', '企客商家抽佣金额', 'enterpriseCommission'],
      ['', '抽佣金额汇总', 'commission'],

      const COL2_RULES = { '毛利': 'profit', '收入汇总': 'totalRevenue', '支出汇总': 'totalExpense' };
      const COL3_RULES = {
        '线上收入汇总': 'onlineRevenue', '线上支出汇总': 'onlineExpense', '线下支出汇总': 'offlineExpense',
        '毛利': 'profit', '收入汇总': 'totalRevenue', '支出汇总': 'totalExpense',

        '订单量': 'orders', '原价交易额': 'gmvAmount',
      };

      const MODULE_DEFS = [
        { searchName: '全品类财务指标', key: 'all', label: '全品类' },
        { searchName: '餐饮财务指标', key: 'food', label: '餐饮' },

        { searchName: '拼好饭财务指标', key: 'group', label: '拼好饭' }
      ];

      function extractModule(data, startRow, colIdx) {
        const result = {};
        FIELD_RULES.forEach(r => result[r[2]] = 0);
        Object.values(COL2_RULES).forEach(f => result[f] = 0);
        Object.values(COL3_RULES).forEach(f => result[f] = 0);

        for (let rn = startRow + 3; rn < Math.min(startRow + 100, data.length); rn++) {
          const row = data[rn];
          if (!row) continue;
          const c2 = String(row[2] || '').trim();
          const c3 = String(row[3] || '').trim();
          const c4 = String(row[4] || '').trim();
          if (c3 && c3.includes('财务指标')) break;
          const val = typeof row[colIdx] === 'number' ? row[colIdx] : parseFloat(String(row[colIdx]).replace(/,/g, '')) || 0;

          // 新的字段映射逻辑：支持 column_name3 + column_name4 匹配
          FIELD_RULES.forEach(([k3, k4, field, isAccumulate]) => {
            if ((k3 === '' || c3 === k3) && c4 === k4) {
              if (isAccumulate) {
                // 累加字段：累加所有匹配的值
                if (!isNaN(val) && val !== 0) {
                  result[field] = (result[field] || 0) + val;
                }
              } else {
                // 非累加字段：只在第一个非零值时赋值
                if (result[field] === 0 && val !== 0) {
                  result[field] = val;
                }
              }
            }
          });
          for (const [k2, field] of Object.entries(COL2_RULES)) {
            if (c2 === k2 && result[field] === 0) result[field] = val;
          }
          for (const [k3, field] of Object.entries(COL3_RULES)) {
            // 关键字段（orders/gmvAmount）不要求c4为空，作为FIELD_RULES的备用匹配
            const isKeyField = (field === 'orders' || field === 'gmvAmount');
            if (c3 === k3 && (isKeyField || c4 === '') && result[field] === 0 && val !== 0) result[field] = val;
          }
        }

        const o = result.orders;
        result.ue = o > 0 ? result.profit / o : 0;
        result.subsidyRatio = result.gmvAmount > 0 ? result.subsidyTotal / result.gmvAmount : 0;
        result.profitRate = result.onlineRevenue > 0 ? result.profit / result.onlineRevenue : 0;
        result.avgRevenuePerOrder = o > 0 ? result.onlineRevenue / o : 0;
        result.avgCostPerOrder = o > 0 ? result.totalExpense / o : 0;
        result.deliveryCostRate = result.onlineRevenue > 0 ? result.deliveryCost / result.onlineRevenue : 0;
        result.fixedCostRate = result.onlineRevenue > 0 ? result.fixedCost / result.onlineRevenue : 0;
        result.subsidyRateB = result.gmvAmount > 0 ? result.subsidyB / result.gmvAmount : 0;
        result.subsidyRateC = result.gmvAmount > 0 ? result.subsidyC / result.gmvAmount : 0;
        result.enterpriseRatio = o > 0 ? result.enterpriseOrders / o : 0;
        result.selfRatio = o > 0 ? result.selfOrders / o : 0;

        return result;
      }

      const merchantData = {};
      for (const mt of MERCHANT_TYPES) {
        let ws = null;
        if (workbook.SheetNames.includes(mt.sheetName)) {
          ws = workbook.Sheets[mt.sheetName];
        } else if (mt.key === 'all' && workbook.SheetNames.length > 0) {
          ws = workbook.Sheets[workbook.SheetNames[0]];
        }
        if (!ws) {
          console.log('[parseExcelFile] sheet未找到:', mt.sheetName);
          continue;
        }
        console.log('[parseExcelFile] 开始解析:', mt.sheetName);

        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
        const cityRow = data[2];
        if (!cityRow) continue;

        const cityMap = {};
        for (let col = 5; col < cityRow.length; col++) {
          const excelName = String(cityRow[col] || '').trim();
          if (!excelName || excelName === '总商') continue;
          cityMap[col] = { excelName, displayName: CONFIG.CITY_DISPLAY_MAP[excelName] || excelName };
        }
        let totalCol = -1;
        for (let col = 5; col < (cityRow.length || 20); col++) {
          if (String(cityRow[col] || '').trim() === '总商') {
            totalCol = col;
            break;
          }
        }

        const modulePositions = {};
        for (let rn = 0; rn < Math.min(500, data.length); rn++) {
          const row = data[rn];
          if (!row) continue;
          const c0 = String(row[0] || '').trim();
          for (const md of MODULE_DEFS) {
            if (c0 === md.searchName && !modulePositions[md.key]) {
              modulePositions[md.key] = rn;
            }
          }
        }

        console.log('[parseExcelFile]', mt.sheetName, '模块数:', Object.keys(modulePositions).length, Object.keys(modulePositions));
        if (Object.keys(modulePositions).length === 0) continue;

        const result = [];
        for (const [col, cityInfo] of Object.entries(cityMap)) {
          const cityData = { name: cityInfo.excelName, displayName: cityInfo.displayName, modules: {} };
          for (const md of MODULE_DEFS) {
            if (modulePositions[md.key] === undefined) continue;
            const fields = extractModule(data, modulePositions[md.key], parseInt(col));
            fields.moduleName = md.label;
            fields.moduleKey = md.key;
            cityData.modules[md.key] = fields;
          }
          result.push(cityData);
        }

        if (totalCol >= 0) {
          const totalData = { name: '总商', displayName: '总商', modules: {} };
          for (const md of MODULE_DEFS) {
            if (modulePositions[md.key] === undefined) continue;
            const fields = extractModule(data, modulePositions[md.key], totalCol);
            fields.moduleName = md.label;
            fields.moduleKey = md.key;
            totalData.modules[md.key] = fields;
          }
          result.unshift(totalData);
        }

        if (result.length > 0) {
          merchantData[mt.key] = { label: mt.label, cities: result };
        }
      }

      console.log('[parseExcelFile] 解析结果:', Object.keys(merchantData));
      Object.entries(merchantData).forEach(([k, v]) => console.log('  ', k, '城市:', v.cities.map(c => c.name)));
      if (Object.keys(merchantData).length === 0) {
        throw new Error('未识别到任何商家类型数据，请确认文件格式正确');
      }
      return merchantData;
    }
    
    function parseDateFromFilename(filename) {
      const p1 = filename.match(/(\d{4})[-_]?(0[1-9]|1[0-2])[-_]?(0[1-9]|[12]\d|3[01])/);
      if (p1) { return p1[1] + '-' + p1[2] + '-' + p1[3]; }
      const p2 = filename.match(/(\d{4})年(\d{1,2})月(\d{1,2})/);
      if (p2) { return p2[1] + '-' + String(parseInt(p2[2])).padStart(2,'0') + '-' + String(parseInt(p2[3])).padStart(2,'0'); }
      const p3 = filename.match(/(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(?![\d年])/);
      if (p3) {
        const yr = new Date().getFullYear();
        return yr + '-' + p3[1] + '-' + p3[2];
      }
      return new Date().toISOString().split('T')[0];
    }

    function buildOutputData(merchantData) {
      const cities = [];
      const allCities = merchantData.all?.cities || [];
      
      allCities.forEach(city => {
        const cityItem = {
          name: city.name,
          displayName: city.displayName,
          modules: city.modules
        };
        cities.push(cityItem);
      });
      
      const dataDate = currentFileName ? parseDateFromFilename(currentFileName) : new Date().toISOString().split('T')[0];
      
      return {
        date: dataDate,
        cities: cities,
        merchantData: merchantData,
        fileName: currentFileName
      };
    }

    async function handleFile(file) {
      if (!file.name.match(/\.(xlsx|xls|csv)$/i)) {
        alert('请选择Excel文件（.xlsx, .xls, .csv格式）');
        return;
      }
      
      currentFileName = file.name;
      
      showStatus('info', '开始处理', '正在解析Excel文件...');
      clearTimeline();
      addTimelineItem('开始解析Excel文件...');
      showProgress(5, '读取文件中...');
      
      try {
        await delay(500);
        
        const reader = new FileReader();
        
        await new Promise((resolve, reject) => {
          reader.onload = resolve;
          reader.onerror = reject;
          reader.readAsArrayBuffer(file);
        });
        
        updateTimelineItem(0, 'done');
        addTimelineItem('解析Excel工作簿...');
        showProgress(20, '解析中...');
        
        await delay(300);
        
        const workbook = XLSX.read(reader.result, { type: 'array' });
        console.log('[Parse] 工作表列表:', workbook.SheetNames);
        
        updateTimelineItem(1, 'done');
        addTimelineItem('提取商家数据...');
        showProgress(40, '提取数据...');
        
        await delay(300);
        
        const merchantData = parseWorkbook(workbook);

    async function handleMultipleFiles(files) {
      const validFiles = files.filter(file => file.name.match(/\.(xlsx|xls|csv)$/i));
      
      if (validFiles.length === 0) {
        alert('请选择Excel文件（.xlsx, .xls, .csv格式）');
        return;
      }
      
      showStatus('info', '批量处理', '正在处理 ' + validFiles.length + ' 个文件...');
      clearTimeline();
      addTimelineItem('开始批量处理 ' + validFiles.length + ' 个文件...');
      showProgress(5, '准备中...');
      
      const allParsedData = [];
      const errors = [];
      
      for (let i = 0; i < validFiles.length; i++) {
        const file = validFiles[i];
        const progress = Math.round(((i + 1) / validFiles.length) * 100);
        
        updateTimelineItem(0, 'done');
        addTimelineItem('处理文件 ' + (i + 1) + '/' + validFiles.length + ': ' + file.name);
        showProgress(progress, '处理中 ' + (i + 1) + '/' + validFiles.length);
        
        try {
          const reader = new FileReader();
          
          await new Promise((resolve, reject) => {
            reader.onload = resolve;
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
          });
          
          const workbook = XLSX.read(reader.result, { type: 'array' });
          const merchantData = parseWorkbook(workbook);
          const data = buildOutputData(merchantData);
          
          const dateStr = parseDateFromFilename(file.name);
          
          allParsedData.push({
            date: dateStr,
            updatedAt: new Date().toISOString(),
            uploadedBy: 'web',
            fileName: file.name,
            currentData: data,
            merchantData: merchantData
          });
          
          updateTimelineItem(timelineItems.length - 1, 'done');
          
        } catch (error) {
          console.error('[Error] 处理文件失败:', file.name, error);
          errors.push({ file: file.name, error: error.message });
          updateTimelineItem(timelineItems.length - 1, 'error');
        }
      }
      
      if (allParsedData.length === 0) {
        showStatus('error', '处理失败', '所有文件处理失败');
        hideProgress();
        return;
      }
      
      parsedData = allParsedData;

      const totalOrders = allParsedData.reduce((sum, d) =>

      const totalGMV = allParsedData.reduce((sum, d) => 
        sum + d.currentData.cities.reduce((s, c) => s + (c.modules.all?.gmvAmount || 0), 0), 0);
      
      const statsHtml = '<div class="status-stats">' +
        '<div class="stat-item"><div class="stat-value">' + allParsedData.length + '</div><div class="stat-label">文件数量</div></div>' +
        '<div class="stat-item"><div class="stat-value">' + totalCities + '</div><div class="stat-label">城市总数</div></div>' +
        '<div class="stat-item"><div class="stat-value">¥' + (totalGMV / 10000).toFixed(2) + '万</div><div class="stat-label">交易总额</div></div>' +
        '</div>';
      
      let statusMessage = '成功处理 ' + allParsedData.length + ' 个文件';
      if (errors.length > 0) {
        statusMessage += '，' + errors.length + ' 个文件失败';

    async function uploadToCloudBatch(data) {
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请先输入有效的GitHub Token');
        return false;
      }
      
      saveToken(token);
      
      const headers = {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json'
      };

      // 步骤1：读取并更新 shared-data.json（完整数据）
      let fullDataSha = null;
      let fullExistingRecords = [];
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const resp = await fetch(GITHUB_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (resp.ok) {
          const githubData = await resp.json();
          fullDataSha = githubData.sha;
          try {
            // 处理大文件：三级策略
            // 方案A：Contents API返回content（小文件）
            if (githubData.content && githubData.content.trim()) {
              fullExistingRecords = JSON.parse(decodeURIComponent(escape(atob(githubData.content.replace(/\n/g, '')))));
              console.log('[Upload] 从Contents API content读取现有数据');
            }
            // 方案B：通过GitHub Blob API读取（绕过1MB限制和CORS）
            // Contents API返回git_url字段，指向blob端点
            if (!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0) {
              const blobUrl = githubData.git_url || githubData.git_blob_url;
              if (blobUrl) {
                try {
                  const blobResp = await fetch(blobUrl, { headers: headers });
                  if (blobResp.ok) {
                    const blobData = await blobResp.json();
                    if (blobData.content) {
                      fullExistingRecords = JSON.parse(decodeURIComponent(escape(atob(blobData.content.replace(/\n/g, '')))));
                      console.log('[Upload] 从Blob API读取现有数据，记录数:', Array.isArray(fullExistingRecords) ? fullExistingRecords.length : 0);
                    }
                  } else {
                    console.warn('[Upload] Blob API响应失败:', blobResp.status);
                  }
                } catch (blobErr) {
                  console.warn('[Upload] Blob API读取失败:', blobErr.message);
                }
              } else {
                console.warn('[Upload] 无git_url字段，无法通过Blob API读取');
              }
            }
            // 方案C：通过download_url读取（可能被CORS拦截）
            if ((!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0) && githubData.download_url) {
              try {
                const downloadResp = await fetch(githubData.download_url);
                if (downloadResp.ok) {
                  fullExistingRecords = await downloadResp.json();
                  console.log('[Upload] 从download_url读取现有数据');
                }
              } catch (downloadErr) {
                console.warn('[Upload] download_url读取失败（可能CORS）:', downloadErr.message);
              }
            }
            // 方案D：同源读取（从GitHub Pages同域名读取，无CORS问题）
            if (!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0) {
              try {
                const sameOriginResp = await fetch('./shared-data.json', { cache: 'no-cache' });
                if (sameOriginResp.ok) {
                  fullExistingRecords = await sameOriginResp.json();
                  console.log('[Upload] 从同源路径读取现有数据，记录数:', Array.isArray(fullExistingRecords) ? fullExistingRecords.length : 0);
                }
              } catch (sameOriginErr) {
                console.warn('[Upload] 同源路径读取失败:', sameOriginErr.message);
              }
            }
            if (!Array.isArray(fullExistingRecords)) {
              fullExistingRecords = [];
            }
          } catch (e) {
            console.error('[Upload] 解析现有数据失败:', e);
            fullExistingRecords = [];
          }
        }
      } catch (e) {
        console.log('[Upload] 无法读取现有完整数据，可能是首次上传');
      }
      
      // 防覆盖保护：如果SHA存在但无法读取现有数据，中止上传
      if (fullDataSha && (!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0)) {
        console.error('[Upload] 无法读取现有数据（文件可能过大或网络问题），中止上传以防止数据丢失！');
        showStatus('error', '上传失败', '无法读取云端现有数据，为防止历史数据丢失，已中止上传。请使用db-sync.py脚本上传，或联系技术人员处理。');
        hideProgress();
        uploadCloudBtn.disabled = false;
        uploadCloudBtn.innerHTML = '☁️ 上传到云端';
        return false;
      }

      const isBatch = Array.isArray(data);
      const recordsToAdd = isBatch ? data : [{
        date: data.date,
        updatedAt: new Date().toISOString(),
        uploadedBy: 'web',
        fileName: currentFileName,
        currentData: data
      }];

      recordsToAdd.forEach(newRecord => {
        const existingIndex = fullExistingRecords.findIndex(r => r.date === newRecord.date);
        
        if (existingIndex >= 0) {
          // 添加版本历史机制：保留历史版本，创建新记录
          const existingRecord = fullExistingRecords[existingIndex];
          
          // 如果存在历史记录，标记为历史版本
          if (existingRecord) {
            existingRecord.isHistorical = true;
            existingRecord.historicalAt = new Date().toISOString();
            existingRecord.historicalVersion = existingRecord.version || 1;
          }
          
          // 创建新记录，版本号递增
          newRecord.version = (existingRecord?.version || 1) + 1;
          newRecord.isHistorical = false;
          newRecord.isLatest = true;
          
          // 替换旧记录
          fullExistingRecords[existingIndex] = newRecord;
          
          console.log('[Upload] 版本控制: date=' + newRecord.date + ', 旧版本=' + (existingRecord?.version || 1) + ', 新版本=' + newRecord.version);
        } else {
          // 新增记录
          newRecord.version = 1;
          newRecord.isHistorical = false;
          newRecord.isLatest = true;
          fullExistingRecords.unshift(newRecord);
        }
      });

      fullExistingRecords.sort((a, b) => new Date(b.date) - new Date(a.date));

      // 步骤2：读取并更新 index.json（轻量级索引）
      let indexSha = null;
      let indexRecords = [];
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const resp = await fetch(INDEX_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (resp.ok) {
          const githubData = await resp.json();
          indexSha = githubData.sha;
          try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(githubData.content.replace(/\n/g, '')))));
            // 兼容：index.json可能是数组或对象格式（含records字段）
            if (Array.isArray(decoded)) {
              indexRecords = decoded;
            } else if (decoded && Array.isArray(decoded.records)) {
              indexRecords = decoded.records;
            } else {
              indexRecords = [];
            }
          } catch (e) {
            console.error('[Upload] index.json解析失败:', e);
            indexRecords = [];
          }
        }
      } catch (e) {
        console.log('[Upload] 无法读取现有索引数据，可能是首次上传');
      }

      // 安全检查：index.json记录数应与shared-data.json一致
      if (indexRecords.length > 0 && fullExistingRecords.length > 0 && indexRecords.length < fullExistingRecords.length) {
        console.warn('[Upload] 警告：index.json记录数(' + indexRecords.length + ')少于shared-data.json记录数(' + fullExistingRecords.length + ')，可能存在数据丢失风险');
      }

      const newIndexRecords = recordsToAdd.map(r => ({
        date: r.date,
        updatedAt: r.updatedAt,
        uploadedBy: r.uploadedBy,
        fileName: r.fileName
      }));

      newIndexRecords.forEach(newRecord => {
        const existingIndexIndex = indexRecords.findIndex(r => r.date === newRecord.date);
        
        if (existingIndexIndex >= 0) {
          // index.json 也添加版本控制
          const existingRecord = indexRecords[existingIndexIndex];
          
          if (existingRecord) {
            existingRecord.isHistorical = true;
            existingRecord.historicalAt = new Date().toISOString();
            existingRecord.historicalVersion = existingRecord.version || 1;
          }
          
          newRecord.version = (existingRecord?.version || 1) + 1;
          newRecord.isHistorical = false;
          newRecord.isLatest = true;
          
          indexRecords[existingIndexIndex] = newRecord;
        } else {
          newRecord.version = 1;
          newRecord.isHistorical = false;
          newRecord.isLatest = true;
          indexRecords.unshift(newRecord);
        }
      });

      indexRecords.sort((a, b) => new Date(b.date) - new Date(a.date));

      // 步骤3：同时上传两个文件
      let allSuccess = true;

      // 3.1 上传 shared-data.json
      const fullContent = btoa(unescape(encodeURIComponent(JSON.stringify(fullExistingRecords, null, 2))));
      const fullBody = {
        message: 'Update financial data: ' + (isBatch ? recordsToAdd.length + ' records' : recordsToAdd[0].date),
        content: fullContent,
        branch: 'main'
      };
      
      if (fullDataSha) {
        fullBody.sha = fullDataSha;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const response = await fetch(GITHUB_API, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(fullBody),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          console.error('[Upload] shared-data.json上传失败:', response.status);
          allSuccess = false;
        }
      } catch (e) {
        console.error('[Upload] shared-data.json上传异常:', e);
        allSuccess = false;
      }

      // 3.2 上传 index.json（保持对象格式）
      const indexObject = {
        version: "v2",
        updatedAt: new Date().toISOString(),
        recordCount: indexRecords.length,
        records: indexRecords
      };
      const indexContent = btoa(unescape(encodeURIComponent(JSON.stringify(indexObject, null, 2))));
      const indexBody = {
        message: 'Update index: ' + (isBatch ? recordsToAdd.length + ' records' : recordsToAdd[0].date),
        content: indexContent,
        branch: 'main'
      };
      
      if (indexSha) {
        indexBody.sha = indexSha;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const response = await fetch(INDEX_API, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(indexBody),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          console.error('[Upload] index.json上传失败:', response.status);
          allSuccess = false;
        }
      } catch (e) {
        console.error('[Upload] index.json上传异常:', e);
        allSuccess = false;
      }

      return allSuccess;
    }

            if (!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0) {
              try {
                const sameOriginResp = await fetch('./shared-data.json', { cache: 'no-cache' });
                if (sameOriginResp.ok) {
                  fullExistingRecords = await sameOriginResp.json();
                  console.log('[Upload] 从同源路径读取现有数据，记录数:', Array.isArray(fullExistingRecords) ? fullExistingRecords.length : 0);
                }
              } catch (sameOriginErr) {
                console.warn('[Upload] 同源路径读取失败:', sameOriginErr.message);
              }
            }
            if (!Array.isArray(fullExistingRecords)) {
              fullExistingRecords = [];
            }
          } catch (e) {
            console.error('[Upload] 解析现有数据失败:', e);
            fullExistingRecords = [];
          }
        }
      } catch (e) {
        console.log('[Upload] 无法读取现有完整数据，可能是首次上传');
      }

      // 防覆盖保护：如果SHA存在但无法读取现有数据，中止上传
      if (fullDataSha && (!Array.isArray(fullExistingRecords) || fullExistingRecords.length === 0)) {
        console.error('[Upload] 无法读取现有数据（文件可能过大或网络问题），中止上传以防止数据丢失！');
        showStatus('error', '上传失败', '无法读取云端现有数据，为防止历史数据丢失，已中止上传。请刷新页面后重试，或联系技术人员处理。');
        hideProgress();
        uploadCloudBtn.disabled = false;
        uploadCloudBtn.innerHTML = '☁️ 上传到云端';
        return false;
      }

      const newFullRecord = {
        date: data.date,
        updatedAt: new Date().toISOString(),
        uploadedBy: 'web',
        fileName: fileName,
        currentData: data
      };

      const existingIndex = fullExistingRecords.findIndex(r => r.date === data.date);
      
      if (existingIndex >= 0) {
        fullExistingRecords[existingIndex] = newFullRecord;
      } else {
        fullExistingRecords.unshift(newFullRecord);
      }

      // 步骤2：读取并更新 index.json（轻量级索引）
      let indexSha = null;
      let indexRecords = [];
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const resp = await fetch(INDEX_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (resp.ok) {
          const githubData = await resp.json();
          indexSha = githubData.sha;
          try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(githubData.content.replace(/\n/g, '')))));
            if (Array.isArray(decoded)) {
              indexRecords = decoded;
            } else if (decoded && Array.isArray(decoded.records)) {
              indexRecords = decoded.records;
            } else {
              indexRecords = [];
            }
          } catch (e) {
            console.error('[Upload] index.json解析失败:', e);
            indexRecords = [];
          }
        }
      } catch (e) {
        console.log('[Upload] 无法读取现有索引数据，可能是首次上传');
      }

      // 安全检查：index.json记录数应与shared-data.json一致
      if (indexRecords.length > 0 && fullExistingRecords.length > 0 && indexRecords.length < fullExistingRecords.length) {
        console.warn('[Upload] 警告：index.json记录数(' + indexRecords.length + ')少于shared-data.json记录数(' + fullExistingRecords.length + ')，可能存在数据丢失风险');
      }

      const newIndexRecord = {
        date: data.date,
        updatedAt: new Date().toISOString(),
        uploadedBy: 'web',
        fileName: fileName
      };

      const existingIndexIndex = indexRecords.findIndex(r => r.date === data.date);
      
      if (existingIndexIndex >= 0) {
        indexRecords[existingIndexIndex] = newIndexRecord;
      } else {
        indexRecords.unshift(newIndexRecord);
      }

      // 步骤3：上传两个文件
      let allSuccess = true;

      // 3.1 上传 shared-data.json
      const fullContent = btoa(unescape(encodeURIComponent(JSON.stringify(fullExistingRecords, null, 2))));
      const fullBody = {
        message: 'Update financial data: ' + data.date,
        content: fullContent,
        branch: 'main'
      };
      
      if (fullDataSha) {
        fullBody.sha = fullDataSha;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const response = await fetch(GITHUB_API, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(fullBody),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          console.error('[Upload] shared-data.json上传失败:', response.status);
          allSuccess = false;
        }
      } catch (e) {
        console.error('[Upload] shared-data.json上传异常:', e);
        allSuccess = false;
      }

      // 3.2 上传 index.json（保持对象格式）
      const indexObject = {
        version: "v2",
        updatedAt: new Date().toISOString(),
        recordCount: indexRecords.length,
        records: indexRecords
      };
      const indexContent = btoa(unescape(encodeURIComponent(JSON.stringify(indexObject, null, 2))));
      const indexBody = {
        message: 'Update index: ' + data.date,
        content: indexContent,
        branch: 'main'
      };
      
      if (indexSha) {
        indexBody.sha = indexSha;
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 30000);
        
        const response = await fetch(INDEX_API, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(indexBody),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          console.error('[Upload] index.json上传失败:', response.status);
          allSuccess = false;
        }
      } catch (e) {
        console.error('[Upload] index.json上传异常:', e);
        allSuccess = false;
      }

      return allSuccess;
    }

    function saveToDataStore(data) {
      if (typeof window !== 'undefined' && window.localStorage) {
        localStorage.setItem('finance_data', JSON.stringify(data));
      }
    }

    goToAnalysisBtn.addEventListener('click', function() {
      if (parsedData) {
        saveToDataStore(parsedData);
        window.location.href = 'index-new.html';
      }
    });

    function refreshHistory() {
      loadHistoryData();
    }

    async function runCloudDiagnostic() {
      cloudTestSection.style.display = 'block';
      cloudTestResults.textContent = '🔍 正在诊断云端连接...\n\n';
      
      const token = getToken();
      let results = '';
      
      try {
        results += '1️⃣ 检查GitHub Token...\n';
        const tokenValid = token && token.startsWith('ghp_');
        results += '   Token格式: ' + (tokenValid ? '✅ 有效' : '❌ 无效') + '\n';
        results += '   Token长度: ' + (token ? token.length : 0) + ' 字符\n\n';
        
        results += '2️⃣ 测试GitHub API读取权限...\n';
        const headers = {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json'
        };
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const readResponse = await fetch(GITHUB_API, { headers: headers, signal: controller.signal });
        clearTimeout(timeoutId);
        
        results += '   读取API响应: ' + readResponse.status + ' ' + readResponse.statusText + '\n';
        
        if (readResponse.ok) {
          const data = await readResponse.json();
          results += '   ✅ 文件存在\n';
          results += '   SHA: ' + (data.sha ? data.sha.substring(0, 20) + '...' : '无') + '\n';
          results += '   内容大小: ' + (data.content ? '有' : '无') + '\n';
          
          try {
            const decoded = JSON.parse(atob(data.content));
            results += '   ✅ JSON解析成功\n';
            results += '   记录数: ' + (Array.isArray(decoded) ? decoded.length : '非数组') + '\n';
            
            if (Array.isArray(decoded) && decoded.length > 0) {
              results += '   最新记录日期: ' + (decoded[0].date || '未知') + '\n';
              results += '   上传者: ' + (decoded[0].uploadedBy || '未知') + '\n';
            }
          } catch (e) {
            results += '   ❌ JSON解析失败: ' + e.message + '\n';
          }
        } else if (readResponse.status === 404) {
          results += '   ⚠️ 文件不存在（正常，首次上传前会显示此信息）\n';
        } else {
          results += '   ❌ API错误: ' + readResponse.status + '\n';
        }
        
        results += '\n3️⃣ 测试GitHub Raw URL访问...\n';
        const rawController = new AbortController();
        const rawTimeoutId = setTimeout(() => rawController.abort(), 10000);
        
        const rawResponse = await fetch(GITHUB_RAW_URL, { signal: rawController.signal });
        clearTimeout(rawTimeoutId);
        
        results += '   Raw URL响应: ' + rawResponse.status + ' ' + rawResponse.statusText + '\n';
        
        if (rawResponse.ok) {
          results += '   ✅ Raw URL可访问\n';
        } else if (rawResponse.status === 404) {
          results += '   ⚠️ Raw文件不存在（正常，首次上传前会显示此信息）\n';
        } else {
          results += '   ❌ Raw URL访问失败\n';
        }
        
        results += '\n4️⃣ 检查CORS策略...\n';
        results += '   GitHub API: ' + (readResponse.ok || readResponse.status === 404 ? '✅ 支持CORS' : '❌ CORS问题') + '\n';
        results += '   GitHub Raw: ' + (rawResponse.ok || rawResponse.status === 404 ? '✅ 支持CORS' : '❌ CORS问题') + '\n';
        
        results += '\n✅ 诊断完成！\n';
        results += '\n💡 如果所有检查都通过，云端功能应该正常工作。\n';
        results += '   如果有任何❌标记，请检查相应配置或Token权限。\n';
        
      } catch (e) {
        results += '\n❌ 诊断失败: ' + e.message + '\n';
        if (e.name === 'AbortError') {
          results += '   可能原因: 网络超时或请求被阻止\n';
        }
      }
      
      cloudTestResults.textContent = results;
      cloudTestResults.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    testCloudBtn.addEventListener('click', runCloudDiagnostic);

    document.addEventListener('DOMContentLoaded', function() {
      loadSavedToken();
      loadHistoryData();
    });

    uploadArea.addEventListener('click', function() { fileInput.click(); });
    uploadArea.addEventListener('dragover', function(e) {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', function() {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        if (files.length === 1) {
          handleFile(files[0]);
        } else {
          handleMultipleFiles(Array.from(files));
        }
      }
    });
    fileInput.addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        if (e.target.files.length === 1) {
          handleFile(e.target.files[0]);
        } else {
          handleMultipleFiles(Array.from(e.target.files));
        }
      }
    });

    async function loadHistoryData() {
      try {
        console.log('[Upload] 开始加载历史记录...');
        
        // 显示加载状态
        const historyLoading = document.getElementById('historyLoading');
        historyLoading.style.display = 'flex';
        historyList.classList.add('hidden');
        
        const token = localStorage.getItem('finance_tool_github_token');
        console.log('[Upload] Token状态:', token ? '已保存' : '未保存');
        const headers = token ? { 'Authorization': 'token ' + token } : {};
        
        console.log('[Upload] 正在请求轻量级索引:', INDEX_API);
        const resp = await fetch(INDEX_API, { headers });
        console.log('[Upload] 请求状态:', resp.status, resp.statusText);
        
        if (resp.ok) {
          const data = await resp.json();
          console.log('[Upload] 索引文件大小:', data.size, '字节');
          
          let content = null;
          
          if (data.content && data.content.trim() !== '') {
            try {
              const base64Content = data.content.replace(/\n/g, '');
              content = decodeURIComponent(escape(atob(base64Content)));
            } catch (decodeError) {
              console.error('[Upload] Base64解码失败:', decodeError);
            }
          } else if (data.download_url) {
            // 即使索引文件很小，也兼容download_url
            try {
              const downloadResp = await fetch(data.download_url);
              if (downloadResp.ok) {
                content = await downloadResp.text();
              }
            } catch (downloadError) {
              console.error('[Upload] 下载索引失败:', downloadError);
            }
          }
          
          if (!content || content.trim() === '') {
            cloudData = [];
            historyLoading.style.display = 'none';
            historyList.classList.remove('hidden');
            historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>暂无上传记录</div><div style="font-size: 13px; margin-top: 4px;">上传数据后会显示在这里</div></div>';
            return;
          }
          
          try {
            cloudData = JSON.parse(content);
            // 兼容：index.json可能是对象格式（含records字段）或数组
            if (cloudData && !Array.isArray(cloudData) && cloudData.records) {
              cloudData = cloudData.records;
            }
          } catch (parseError) {
            console.error('[Error] JSON解析失败:', parseError);
            cloudData = [];
            historyLoading.style.display = 'none';
            historyList.classList.remove('hidden');
            historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>数据格式错误</div><div style="font-size: 13px; margin-top: 4px;">请检查云端数据</div></div>';
            return;
          }
          
          if (!Array.isArray(cloudData)) {
            console.error('[Upload] 云端数据不是数组:', typeof cloudData);
            cloudData = [];
          }
          
          console.log('[Upload] 解析后的数据条数:', cloudData.length);
          
          if (cloudData.length === 0) {
            historyLoading.style.display = 'none';
            historyList.classList.remove('hidden');
            historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>暂无上传记录</div><div style="font-size: 13px; margin-top: 4px;">上传数据后会显示在这里</div></div>';
            return;
          }
          
          console.log('[Upload] 正在渲染历史记录列表...');
          let html = '';
          cloudData.forEach((record, index) => {
            const uploadedAt = new Date(record.updatedAt).toLocaleString('zh-CN');
            console.log('[Upload] 记录' + index + ':', record.date, record.fileName);
            html += '<div class="history-item">' +
              '<div>' +
                '<div class="history-date">' + record.date + '</div>' +
                '<div class="history-info">文件: ' + (record.fileName || '未知') + ' | 上传时间: ' + uploadedAt + '</div>' +
              '</div>' +
              '<div class="history-actions">' +
                '<button class="history-btn view" onclick="viewRecord(' + index + ')">查看</button>' +
                '<button class="history-btn delete" onclick="deleteRecord(' + index + ')">删除</button>' +
              '</div>' +
            '</div>';
          });
          
          console.log('[Upload] 生成HTML长度:', html.length);
          historyLoading.style.display = 'none';
          historyList.classList.remove('hidden');
          historyList.innerHTML = html;
          console.log('[Upload] 历史记录渲染完成！');
        } else {
          historyLoading.style.display = 'none';
          historyList.classList.remove('hidden');
          historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>无法加载历史记录</div><div style="font-size: 13px; margin-top: 4px;">请检查网络连接</div></div>';
        }
      } catch (e) {
        console.error('[Error] 加载历史记录失败:', e);
        const historyLoading = document.getElementById('historyLoading');
        historyLoading.style.display = 'none';
        historyList.classList.remove('hidden');
        historyList.innerHTML = '<div class="empty-state"><i>📭</i><div>历史记录加载失败</div><div style="font-size: 13px; margin-top: 4px;">将创建新的数据集</div></div>';
        cloudData = [];
      }
    }

    async function viewRecord(index) {
      const record = cloudData[index];
      if (!record) return;
      
      showStatus('info', '正在加载', '正在从云端加载完整数据...');
      
      const token = getToken();
      const headers = token ? { 'Authorization': 'token ' + token } : {};
      
      try {
        const resp = await fetch(GITHUB_API, { headers });
        if (!resp.ok) throw new Error('获取数据失败');
        
        const data = await resp.json();
        let content = null;
        
        if (data.content && data.content.trim()) {
          content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        } else if (data.download_url) {
          const downloadResp = await fetch(data.download_url);
          content = await downloadResp.text();
        }
        
        if (!content) throw new Error('无法获取数据');
        
        const fullData = JSON.parse(content);
        const fullRecord = fullData[index];
        
        if (fullRecord && fullRecord.currentData) {
          parsedData = fullRecord.currentData;
          renderPreview(parsedData);
          showStatus('success', '查看历史数据', '已加载 ' + record.date + ' 的数据');
          actions.style.display = 'flex';
        }
      } catch (e) {
        console.error('[Error] 加载失败:', e);
        showStatus('error', '加载失败', '无法加载完整数据: ' + e.message);
      }
    }

    async function deleteRecord(index) {
      if (!confirm('确定要删除这条记录吗？')) return;
      
      const token = getToken();
      if (!token || !token.startsWith('ghp_')) {
        alert('请先输入有效的GitHub Token');
        return;
      }
      
      try {
        // 同时处理两个文件
        const headers = {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json'
        };
        
        // 1. 获取shared-data.json并更新
        const sharedResp = await fetch(GITHUB_API, { headers });
        const sharedData = await sharedResp.json();
        let sharedContent = null;
        
        if (sharedData.content && sharedData.content.trim()) {
          sharedContent = decodeURIComponent(escape(atob(sharedData.content.replace(/\n/g, ''))));
        } else if (sharedData.download_url) {
          const downloadResp = await fetch(sharedData.download_url);
          sharedContent = await downloadResp.text();
        }
        
        const sharedArray = JSON.parse(sharedContent);
        sharedArray.splice(index, 1);
        
        // 2. 获取index.json并更新
        const indexResp = await fetch(INDEX_API, { headers });
        const indexData = await indexResp.json();
        let indexContent = null;
        
        if (indexData.content && indexData.content.trim()) {
          indexContent = decodeURIComponent(escape(atob(indexData.content.replace(/\n/g, ''))));
        } else if (indexData.download_url) {
          const downloadResp = await fetch(indexData.download_url);
          indexContent = await downloadResp.text();
        }
        
        const indexArray = JSON.parse(indexContent);
        indexArray.splice(index, 1);
        
        // 3. 同时上传两个文件
        const sharedBody = {
          message: 'Delete record',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(sharedArray, null, 2)))),
          sha: sharedData.sha,
          branch: 'main'
        };
        
        const indexBody = {
          message: 'Delete index record',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(indexArray, null, 2)))),
          sha: indexData.sha,
          branch: 'main'
        };
        
        await Promise.all([
          fetch(GITHUB_API, {
            method: 'PUT',
            headers,
            body: JSON.stringify(sharedBody)
          }),
          fetch(INDEX_API, {
            method: 'PUT',
            headers,
            body: JSON.stringify(indexBody)
          })
        ]);
        
        loadHistoryData();
        alert('删除成功！');
      } catch (e) {
        console.error('[Error] 删除失败:', e);
        alert('删除失败: ' + e.message);
      }
    }
  </script>
