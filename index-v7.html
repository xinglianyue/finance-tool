<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>财务账单分析工具 - 技术团队版</title>
<style>
:root {--primary:#4F46E5;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--bg:#F3F4F6;--card:#fff;--text:#1F2937;--text-sub:#6B7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:16px;padding-bottom:80px}
.header{text-align:center;padding:16px;background:var(--card);border-radius:12px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.header h1{font-size:18px;color:var(--primary);margin-bottom:4px}
.subtitle{font-size:12px;color:var(--text-sub)}
.upload-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-label{font-size:12px;color:var(--text-sub);margin-bottom:4px}
.card-value{font-size:20px;font-weight:700}
.card-value.success{color:var(--success)}.card-value.danger{color:var(--danger)}
.card-unit{font-size:11px;color:var(--text-sub);margin-top:2px}
.alerts{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.alert-card{flex:1;min-width:100px;background:var(--card);border-radius:12px;padding:14px;text-align:center;border-left:3px solid var(--success)}
.alert-card.loss{border-color:var(--danger)}.alert-card.warn{border-color:var(--warning)}
.alert-num{font-size:24px;font-weight:700}.loss .alert-num{color:var(--danger)}.warn .alert-num{color:var(--warning)}.good .alert-num{color:var(--success)}
.alert-label{font-size:12px;color:var(--text-sub);margin-top:4px}
.section-title{font-size:14px;font-weight:600;color:var(--text-sub);margin:16px 0 10px}
.table-container{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fc;color:var(--text-sub);font-weight:600;font-size:11px;padding:10px 12px;text-align:left}
td{padding:10px 12px;border-top:1px solid #e5e7eb}
.footer{text-align:center;padding:20px;color:var(--text-sub);font-size:12px}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;width:90%;max-width:440px}
.modal-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px}
.modal-close{background:none;border:none;font-size:24px;color:#9ca3af;cursor:pointer}
.modal-body{padding:20px}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
input[type="date"],input[type="file"]{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}
.upload-zone{border:2px dashed #d1d5db;border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:rgba(79,70,229,.05)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:14px}.upload-hint{font-size:12px;color:var(--text-sub);margin-top:4px}
.file-info{margin-top:8px;padding:8px;background:#d1fae5;border-radius:6px;font-size:13px;color:#065f46;display:none}
.file-info.show{display:block}
.format-hint{background:#f9fafb;padding:10px;border-radius:8px;font-size:12px;line-height:1.6}
.format-hint code{color:var(--primary);font-family:monospace}
.btn-primary{background:var(--primary);color:#fff;padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.btn-secondary{background:#f3f4f6;color:#374151;padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.modal-footer{padding:16px 20px;border-top:1px solid #e5e7eb;display:flex;gap:10px;justify-content:flex-end}
.btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<div style="position:relative">
  <div class="header">
    <h1>📊 财务账单分析</h1>
    <div class="subtitle" id="dataSubtitle">数据日期：示例数据</div>
  </div>
  <button class="upload-btn" onclick="UploadModal.open()">📤 上传数据</button>
</div>

<div class="cards">
  <div class="card"><div class="card-label">总收入</div><div class="card-value" id="totalRevenue">-</div><div class="card-unit">元</div></div>
  <div class="card"><div class="card-label">总成本</div><div class="card-value" id="totalCost">-</div><div class="card-unit">元</div></div>
  <div class="card"><div class="card-label">总毛利</div><div class="card-value success" id="totalProfit">-</div><div class="card-unit">元</div></div>
  <div class="card"><div class="card-label">订单量</div><div class="card-value" id="totalOrders">-</div><div class="card-unit">单</div></div>
</div>

<div class="alerts">
  <div class="alert-card loss"><div class="alert-num" id="lossCount">-</div><div class="alert-label">亏损城市</div></div>
  <div class="alert-card warn"><div class="alert-num" id="warnCount">-</div><div class="alert-label">UE 警告</div></div>
  <div class="alert-card good"><div class="alert-num" id="goodCount">-</div><div class="alert-label">健康城市</div></div>
</div>

<div class="section-title">城市明细</div>
<div class="table-container">
  <table>
    <thead><tr><th>城市</th><th>订单量</th><th>收入</th><th>毛利</th><th>UE</th></tr></thead>
    <tbody id="cityTableBody"></tbody>
  </table>
</div>

<div class="footer">财务账单分析工具 v8 · 技术团队专用</div>

<!-- Upload Modal -->
<div class="modal" id="uploadModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📤 上传 CSV 数据</h3>
      <button class="modal-close" onclick="UploadModal.close()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>截止日期 *</label>
        <input type="date" id="uploadDate" required>
      </div>
      <div class="form-group">
        <label>选择 CSV 文件 *</label>
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">📄</div>
          <div class="upload-text">点击或拖拽选择 CSV 文件</div>
          <div class="upload-hint">支持技术团队导出的 CSV 格式</div>
          <input type="file" id="fileInput" accept=".csv" hidden>
        </div>
        <div class="file-info" id="fileInfo"></div>
      </div>
      <div class="form-group">
        <label>CSV 格式说明</label>
        <div class="format-hint">
          <strong>通用格式：</strong><code>city,orders,revenue,cost,profit</code><br/>
          <strong>技术团队：</strong><code>cityName,orderCnt,incomeSum,outcomeSum,takeoutGross</code>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="UploadModal.close()">取消</button>
      <button class="btn-primary" id="uploadBtn" onclick="UploadModal.upload()" disabled>上传</button>
    </div>
  </div>
</div>

<script>
// ============ CSV 解析器（双格式兼容） ============
const CSVParser={
  parse:function(text){
    if(!text||typeof text!=="string")throw new Error("无效的 CSV 内容");
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2)throw new Error("CSV 至少需要表头和一行数据");
    const headers=this._parseLine(lines[0]).map(h=>h.toLowerCase().trim());
    const idx={
      city:headers.findIndex(h=>["cityname","city","城市名","城市"].includes(h)),
      orders:headers.findIndex(h=>["ordercnt","orders","订单量","订单"].includes(h)),
      revenue:headers.findIndex(h=>["incomesum","revenue","收入"].includes(h)),
      cost:headers.findIndex(h=>["outcomesum","cost","支出","成本"].includes(h)),
      profit:headers.findIndex(h=>["takeoutgross","profit","毛利","利润"].includes(h))
    };
    if(idx.city===-1)throw new Error("未找到城市列（需要 cityName/city/城市名）");
    if(idx.revenue===-1)throw new Error("未找到收入列（需要 incomeSum/revenue/收入）");
    const map=new Map();
    for(let i=1;i<lines.length;i++){
      const line=lines[i].trim();
      if(!line)continue;
      try{
        const vals=this._parseLine(line);
        const data={
          name:this._get(vals,idx.city)||"",
          orders:this._num(this._get(vals,idx.orders)),
          revenue:this._num(this._get(vals,idx.revenue)),
          cost:this._num(this._get(vals,idx.cost)),
          profit:this._num(this._get(vals,idx.profit))
        };
        if(!data.name)continue;
        if(idx.profit===-1||data.profit===0)data.profit=data.revenue+data.cost;
        if(!map.has(data.name))map.set(data.name,{...data});
        else{
          const p=map.get(data.name);
          p.orders+=data.orders;p.revenue+=data.revenue;p.cost+=data.cost;p.profit+=data.profit;
        }
      }catch(e){console.warn("[CSV] 跳过行",i);continue}
    }
    return Array.from(map.values()).map(c=>({...c,ue:c.orders>0?c.revenue/c.orders:0,marginRate:c.revenue>0?(c.profit/c.revenue)*100:0}));
  },
  _parseLine:function(l){if(!l)return[];const r=[],chars=l.split("");let cur="",q=false;for(const c of chars){if(c==='"')q=!q;else if(c===","&&!q){r.push(cur.trim());cur=""}else cur+=c}r.push(cur.trim());return r},
  _get:function(v,i){return Array.isArray(v)&&Number.isFinite(i)&&i>=0&&i<v.length?v[i]||"":""},
  _num:function(v){if(v===null||v===undefined||v==="")return 0;try{return isNaN(parseFloat(String(v).replace(/[¥,,元￥\s]/g,"")))?0:parseFloat(String(v).replace(/[¥,,元￥\s]/g,""))}catch{return 0}}
};

// ============ 示例数据 ============
const DEMO_DATA=[
  {name:"承德市",orders:321456,revenue:2456789,cost:-2345678,profit:111111,ue:7.64},
  {name:"围场县",orders:123456,revenue:987654,cost:-876543,profit:111111,ue:8.00},
  {name:"玉田县",orders:98765,revenue:876543,cost:-765432,profit:111111,ue:8.87},
  {name:"康保县",orders:76543,revenue:654321,cost:-765432,profit:-111111,ue:8.55},
  {name:"安国市",orders:234567,revenue:1987654,cost:-1876543,profit:111111,ue:8.47}
];

// ============ 初始化 ============
window.onload=function(){
  document.getElementById("uploadDate").valueAsDate=new Date();
  render(DEMO_DATA,"示例数据");
};

// ============ 渲染函数 ============
function render(cities,dateLabel){
  let rev=0,cost=0,prof=0,ord=0,loss=0,warn=0,good=0;
  cities.forEach(c=>{rev+=c.revenue;cost+=c.cost;prof+=c.profit;ord+=c.orders;if(c.profit<0)loss++;else if(c.ue<8)warn++;else good++});
  document.getElementById("totalRevenue").textContent=rev.toLocaleString();
  document.getElementById("totalCost").textContent=cost.toLocaleString();
  const profEl=document.getElementById("totalProfit");
  profEl.textContent=prof.toLocaleString();
  profEl.className="card-value "+(prof>=0?"success":"danger");
  document.getElementById("totalOrders").textContent=ord.toLocaleString();
  document.getElementById("lossCount").textContent=loss;
  document.getElementById("warnCount").textContent=warn;
  document.getElementById("goodCount").textContent=good;
  document.getElementById("dataSubtitle").textContent="数据日期："+dateLabel;
  const tbody=document.getElementById("cityTableBody");
  tbody.innerHTML="";
  [...cities].sort((a,b)=>b.ue-a.ue).forEach(c=>{
    const tr=document.createElement("tr");
    const cls=c.profit<0?"danger":(c.ue<8?"warn":"success");
    tr.innerHTML=`<td><strong>${c.name}</strong></td><td>${Math.round(c.orders).toLocaleString()}</td><td>${Math.round(c.revenue).toLocaleString()}</td><td class="${cls}">${Math.round(c.profit).toLocaleString()}</td><td class="${cls}">${c.ue.toFixed(2)}</td>`;
    tbody.appendChild(tr);
  });
}

// ============ 上传弹窗 ============
const UploadModal={
  file:null,
  open:function(){document.getElementById("uploadModal").classList.add("show");this.file=null;document.getElementById("fileInfo").classList.remove("show");document.getElementById("uploadBtn").disabled=true},
  close:function(){document.getElementById("uploadModal").classList.remove("show")},
  init:function(){
    const zone=document.getElementById("uploadZone"),input=document.getElementById("fileInput"),date=document.getElementById("uploadDate"),btn=document.getElementById("uploadBtn");
    zone.onclick=()=>input.click();
    input.onchange=e=>{if(e.target.files.length>0)this.handleFile(e.target.files[0])};
    zone.ondragover=e=>{e.preventDefault();zone.classList.add("dragover")};
    zone.ondragleave=()=>zone.classList.remove("dragover");
    zone.ondrop=e=>{e.preventDefault();zone.classList.remove("dragover");if(e.dataTransfer.files.length>0)this.handleFile(e.dataTransfer.files[0])};
    date.onchange=()=>this.checkBtn();
    btn.disabled=true;
  },
  handleFile:function(f){
    if(!f)return alert("请选择文件");
    if(!f.name.toLowerCase().endsWith(".csv"))return alert("只支持 CSV 文件");
    this.file=f;
    const info=document.getElementById("fileInfo");
    info.textContent="✅ "+f.name+" ("+(f.size/1024).toFixed(1)+" KB)";
    info.classList.add("show");
    this.checkBtn();
  },
  checkBtn:function(){document.getElementById("uploadBtn").disabled=!(document.getElementById("uploadDate").value&&this.file)},
  upload:function(){
    const date=document.getElementById("uploadDate").value;
    if(!date)return alert("请选择日期");
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const cities=CSVParser.parse(e.target.result);
        if(cities.length===0)return alert("文件中没有找到有效数据");
        localStorage.setItem("finance_tool_data_"+date,JSON.stringify({date,cities,uploadedAt:new Date().toISOString()}));
        localStorage.setItem("finance_tool_latest_date",date);
        alert("✅ 上传成功！\n\n日期："+date+"\n城市数："+cities.length+"\n\n页面将自动刷新显示新数据。");
        location.reload();
      }catch(err){alert("❌ 解析失败\n\n"+err.message)}
    };
    reader.onerror=()=>alert("❌ 文件读取失败");
    reader.readAsText(this.file);
  }
};

UploadModal.init();
</script>
</body>
</html>
