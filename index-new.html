            level: 'warning',
            title: '补贴率过高',
            desc: `补贴率为${(subsidyRatio * 100).toFixed(1)}%，超过15%预警阈值`,
            score: 4
          });
        }
      });

      // 按严重程度排序
      anomalies.sort((a, b) => b.score - a.score);

      let html = '';
      anomalies.forEach((anomaly, idx) => {
        const levelClass = anomaly.level === 'danger' ? 'text-danger' : 'text-warning';
        const icon = anomaly.level === 'danger' ? '🚨' : '⚠️';
        html += `
          <div class="collapsible">
            <div class="collapsible-header">${icon} ${idx + 1}. ${anomaly.city} - ${anomaly.title} <span class="${levelClass}">${anomaly.score > 7 ? 'P0' : 'P1'}</span></div>
            <div class="collapsible-content"><p>${anomaly.desc}</p><p><strong>建议：</strong>${getSuggestion(anomaly)}</p></div>
          </div>
        `;
      });

      anomalyList.innerHTML = html || '<div class="empty-state"><div>✅ 暂无严重异常</div></div>';

      anomalyList.querySelectorAll('.collapsible-header').forEach(header => {
        header.addEventListener('click', () => header.parentElement.classList.toggle('collapsed'));
      });
    }

    function getSuggestion(anomaly) {
      if (anomaly.title.includes('UE')) {
        return '建议降低配送成本，优化补贴策略，提高客单价';
      } else if (anomaly.title.includes('毛利率')) {
        return '建议提高抽佣比例，控制成本支出，优化商家结构';
      } else if (anomaly.title.includes('补贴率')) {
        return '建议调整补贴策略，优化补贴使用效率';
      }
      return '建议深入分析相关指标，制定优化方案';
    }

    function renderCostStructure() {
      const container = document.getElementById('costStructureCharts');
      
      const totals = currentData.totals;
      const deliveryCost = totals.deliveryCost || 0;
      const subsidyTotal = totals.subsidyTotal || 0;
      const platformCost = totals.platformCost || 0;
      const fixedCost = totals.fixedCost || 0;
      const totalCost = deliveryCost + subsidyTotal + platformCost + fixedCost;

      const ctx = document.createElement('canvas');
      container.innerHTML = '';
      container.appendChild(ctx);

      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: ['配送成本', '补贴支出', '平台成本', '固定成本'],
          datasets: [{
            data: [deliveryCost, subsidyTotal, platformCost, fixedCost],
            backgroundColor: ['#4f46e5', '#f59e0b', '#dc2626', '#64748b'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    function renderSuggestions() {
      const suggestions = document.getElementById('insightsSuggestions');
      const totals = currentData.totals;
      const ue = parseFloat(totals.ue) || 0;
      const profitRate = parseFloat(totals.profitRate) || 0;
      const subsidyRatio = parseFloat(totals.subsidyRatio) || 0;

      const suggestList = [];

      if (ue < 0.5) {
        suggestList.push({
          priority: 'P0',
          title: '提升UE',
          desc: `当前UE为${ue.toFixed(2)}元，建议目标提升至0.5元以上`,
          action: '优化配送成本结构，降低单位配送成本；调整补贴策略，提高补贴效率'
        });
      }

      if (profitRate < 0.2) {
        suggestList.push({
          priority: 'P0',
          title: '提升毛利率',
          desc: `当前毛利率为${(profitRate * 100).toFixed(1)}%，建议目标提升至20%以上`,
          action: '优化商家结构，增加高毛利商家占比；合理调整抽佣政策'
        });
      }

      if (subsidyRatio > 0.1) {
        suggestList.push({
          priority: 'P1',
          title: '控制补贴率',
          desc: `当前补贴率为${(subsidyRatio * 100).toFixed(1)}%，建议控制在10%以内`,
          action: '精细化补贴策略，定向补贴高潜力商家；优化C端补贴使用方式'
        });
      }

      suggestList.push({
        priority: 'P1',
        title: '提升订单量',
        desc: `当前订单量${formatNumber(totals.orders)}，建议持续增长`,
        action: '拓展商家数量，优化商家服务；开展营销活动，提升用户活跃度'
      });

      let html = '<div style="display: grid; gap: 12px;">';
      suggestList.forEach((item, idx) => {
        const priorityClass = item.priority === 'P0' ? 'bg-red-500' : 'bg-yellow-500';
        html += `
          <div class="card" style="padding: 16px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
              <span class="${priorityClass} text-white px-2 py-1 rounded text-xs">${item.priority}</span>
              <strong>${item.title}</strong>
            </div>
            <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 8px;">${item.desc}</p>
            <p style="font-size: 13px;"><strong>行动建议：</strong>${item.action}</p>
          </div>
        `;
      });
      html += '</div>';

      suggestions.innerHTML = html;
    }

    function generateReport() {
      const output = document.getElementById('reportOutput');
      output.classList.remove('hidden');

      const totals = currentData.totals;
      const now = new Date();
      const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;

      const healthScore = Math.round(((parseFloat(totals.ue) || 0) * 100 + ((parseFloat(totals.profitRate) || 0) * 500)) / 6);
      const merchantLabel = allMerchantData && allMerchantData[currentMerchantType] ? allMerchantData[currentMerchantType].label : '全量商家';
      
      let report = '<div style="padding: 16px; background: var(--bg-card); border-radius: 8px;">';
      report += '<h3 style="color: var(--primary); margin-bottom: 16px;">📊 财务分析报告</h3>';
      report += '<p><strong>生成时间：</strong>' + dateStr + '</p>';
      report += '<p><strong>商家类型：</strong>' + merchantLabel + '</p>';
      report += '<h4 style="margin-top: 16px; margin-bottom: 8px;">一、核心指标概览</h4>';
      report += '<ul>';
      report += '<li>订单量：' + formatNumber(totals.orders) + '</li>';
      report += '<li>交易额：' + formatMoney(totals.gmvAmount) + '</li>';
      report += '<li>毛利：' + formatMoney(totals.profit) + '</li>';
      report += '<li>UE：' + (totals.ue || 0).toFixed(2) + '元</li>';
      report += '<li>毛利率：' + formatPercent(totals.profitRate) + '</li>';
      report += '<li>补贴率：' + formatPercent(totals.subsidyRatio) + '</li>';
      report += '</ul>';
      report += '<h4 style="margin-top: 16px; margin-bottom: 8px;">二、健康度评估</h4>';
      report += '<p>综合健康度：' + healthScore + '分</p>';
      report += '<h4 style="margin-top: 16px; margin-bottom: 8px;">三、异常预警</h4>';

      let anomalyCount = 0;
      currentData.cities.forEach(city => {
        const mod = city.modules.all || {};
        const ue = parseFloat(mod.ue) || 0;
        const profitRate = parseFloat(mod.profitRate) || 0;
        if (ue < 0.1 || profitRate < 0.1) {
          anomalyCount++;
          report += '<p>⚠️ ' + getCityDisplayName(city.displayName) + '：UE=' + ue.toFixed(2) + '元，毛利率=' + formatPercent(profitRate) + '</p>';
        }
      });

      if (anomalyCount === 0) {
        report += '<p>✅ 暂无严重异常</p>';
      }

      report += '<h4 style="margin-top: 16px; margin-bottom: 8px;">四、建议措施</h4>';
      report += '<p>1. 关注UE低于0.5元的城市，分析成本结构</p>';
      report += '<p>2. 优化补贴策略，降低不必要的补贴支出</p>';
      report += '<p>3. 持续提升订单量和客单价</p>';
      report += '</div>';

      output.innerHTML = report;
      showToast('报告已生成！', 'success');
    }

    function exportData() {
      if (!currentData) {
        showToast('请先加载数据', 'error');
        return;
      }

      const wb = XLSX.utils.book_new();
      const totalsData = [{ '指标': '总商数据', ...currentData.totals }];
      const ws = XLSX.utils.json_to_sheet(totalsData);
      XLSX.utils.book_append_sheet(wb, ws, '总商数据');

      if (currentData.cities.length > 0) {
        const cityData = currentData.cities.map(city => ({
          城市: getCityDisplayName(city.displayName),
          ...city.modules.all || {}
        }));
        const ws2 = XLSX.utils.json_to_sheet(cityData);
        XLSX.utils.book_append_sheet(wb, ws2, '城市数据');
      }

      XLSX.writeFile(wb, '财务分析数据.xlsx');
      showToast('数据导出成功！', 'success');
    }

    function clearStorage() {
      if (confirm('确定要清除所有数据吗？')) {
        DataStore.clear();
        StateManager.reset();
        
        document.getElementById('overviewEmpty').classList.remove('hidden');
        document.getElementById('overviewData').classList.add('hidden');
        document.getElementById('dimensionEmpty').classList.remove('hidden');
        document.getElementById('dimensionData').classList.add('hidden');
        document.getElementById('trendEmpty').classList.remove('hidden');
        document.getElementById('trendData').classList.add('hidden');
        document.getElementById('sensitivityEmpty').classList.remove('hidden');
        document.getElementById('sensitivityData').classList.add('hidden');
        
        showToast('数据已清除！', 'success');
      }
    }

    window.onload = async function() {
      console.log('[App] 开始初始化...');
      console.log('[App] 强制从云端加载模式');

      // 显示骨架屏
      showSkeleton();

      // 显示加载状态面板
      const loadingPanel = document.getElementById('cloudLoadingPanel');
      const loadingText = document.getElementById('cloudLoadingText');
      const loadingProgress = document.getElementById('cloudLoadingProgress');
      
      loadingPanel.style.display = 'block';
      loadingPanel.className = 'cloud-loading-panel';
      loadingText.textContent = '正在从云端加载数据...';
      loadingProgress.textContent = '连接服务器...';
      
      // 强制从云端加载
      console.log('[App] 开始从云端加载...');
      
      let loaded = false;
      
      try {
        loadingProgress.textContent = '正在连接云端服务器...';
        loaded = await loadFromCloud();
      } catch (error) {
        console.error('[App] 加载失败:', error);
        loadingProgress.textContent = '加载失败: ' + error.message;
      }
      
      // 加载完成后的处理
      if (!loaded) {
        console.log('[App] 云端无数据或加载失败，显示空状态');
        StateManager.init(DataStore.load());
        
        loadingPanel.className = 'cloud-loading-panel error';
        loadingText.textContent = '⚠️ 数据加载失败';
        loadingProgress.textContent = '点击右下角"复制信息"按钮获取诊断数据';
        
        const logs = collectDiagnosticLogs();
        showDiagnostic(logs);
        
        return;
      }
      
      // 加载成功
      const loadedData = DataStore.load();
      StateManager.init(loadedData);
      
      // 更新全局变量
      if (loadedData) {
        importHistory = loadedData.importHistory || [];
        currentData = loadedData.currentData || null;
        allMerchantData = loadedData.allMerchantData || null;
        currentImportIndex = loadedData.currentImportIndex || 0;
        currentMerchantType = loadedData.currentMerchantType || 'all';
      }
      
      loadingPanel.className = 'cloud-loading-panel success';
      loadingText.textContent = '✅ 数据加载成功';

      const recordCount = importHistory?.length || 0;
      const cityCount = currentData?.cities?.length || 0;
      loadingProgress.textContent = `已加载 ${recordCount} 条历史记录，共 ${cityCount} 个城市数据`;

      // 2秒后自动隐藏
      setTimeout(() => {
        loadingPanel.style.display = 'none';
        
        console.log('[App] 开始渲染UI，当前currentData:', currentData);
        console.log('[App] 当前importHistory:', importHistory);
        
        // 渲染UI
        renderImportSelector();
        renderOverview();
        renderDimension();
        renderTrend();
      }, 2000);
    };
  </script>
</body>
</html>
